<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DROP HUNTING | OUJI KATAMI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main id="scroller">
    <section class="snap-panel">
        <div class="container" style="padding-top: 80px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box;">
            
            <div class="cyber-box" style="width: 90%; max-width: 400px; padding: 20px; margin-bottom: 20px;">
                <p style="font-size: 0.6rem; color: #666; margin-bottom: 12px; text-align: center; letter-spacing: 2px;">FIND AIRDROP TUTORIAL</p>
                <input type="text" id="tutorialSearch" onkeyup="searchTutorial()" placeholder="Search..." 
                       style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; text-align: center;">

                <div id="tutorialContainer" style="width: 100%; margin-top: 20px; display: flex; flex-direction: column; gap: 12px;">
                    </div>
            </div>

            <div class="cyber-box" style="width: 90%; max-width: 400px; padding: 20px;">
                <h2 style="font-size: 0.8rem; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 2px; text-align: center;">AIRDROP TOOLS</h2>
                <div class="cex-grid">
                    <a href="#" class="cex-btn">BINANCE</a>
                    <a href="#" class="cex-btn">BYBIT</a>
                    <a href="#" class="cex-btn">OKX</a>
                    <a href="#" class="cex-btn">BITGET</a>
                    <a href="#" class="cex-btn">KUCOIN</a>
                    <a href="#" class="cex-btn">GATE.IO</a>
                </div>
            </div>

        </div>
    </section>
</main>

<div id="tutorialModal" class="modal-vanta">
    <div class="modal-content-cyber">
        <span class="close-modal" onclick="closeModal()">× CLOSE</span>
        <div id="modalBody" class="modal-body-text"></div>
    </div>
</div>

<script>
const TOKEN = "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";
const DB_ID = "335fee4b95628099895be4d2b2f2248e";
const PROXY = "https://api.allorigins.win/get?url=";

async function fetchAirdrops() {
    const container = document.getElementById('tutorialContainer');
    container.innerHTML = "<p style='color:#444; font-size:0.5rem; text-align:center;'>CONNECTING...</p>";

    const targetUrl = encodeURIComponent(`https://api.notion.com/v1/databases/${DB_ID}/query`);
    
    try {
        const res = await fetch(PROXY + targetUrl);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        container.innerHTML = "";
        data.results.forEach(page => {
            const name = page.properties["AIRDROP NAME"]?.title[0]?.plain_text || "UNTITLED";
            const tags = page.properties["TAGS"]?.multi_select.map(t => t.name).join(" • ") || "ACTIVE";
            
            const div = document.createElement('div');
            div.className = "notion-item";
            div.style = "background:rgba(255,255,255,0.02); border:1px solid #222; padding:15px; border-radius:10px; cursor:pointer;";
            div.onclick = () => openTutorial(page.id);
            div.innerHTML = `<span style="font-size:0.5rem; color:#444;">${tags.toUpperCase()}</span><h4 style="color:#fff; margin-top:5px; font-size:0.8rem;">${name.toUpperCase()}</h4>`;
            container.appendChild(div);
        });
    } catch (e) {
        container.innerHTML = "<p style='color:red;'>FAILED TO LOAD</p>";
    }
}

// Fungsi Cari
function searchTutorial() {
    let input = document.getElementById('tutorialSearch').value.toLowerCase();
    let items = document.getElementsByClassName('notion-item');
    for (i = 0; i < items.length; i++) {
        if (!items[i].innerHTML.toLowerCase().includes(input)) {
            items[i].style.display="none";
        } else {
            items[i].style.display="block";
        }
    }
}

async function openTutorial(id) {
    const modal = document.getElementById('tutorialModal');
    const body = document.getElementById('modalBody');
    modal.style.display = "block";
    body.innerHTML = "LOADING...";
    
    try {
        const res = await fetch(PROXY + encodeURIComponent(`https://api.notion.com/v1/blocks/${id}/children`));
        const json = await res.json();
        const data = JSON.parse(json.contents);
        let html = "";
        data.results.forEach(b => {
            if (b.type === 'paragraph') html += `<p style="margin-bottom:15px;">${b.paragraph.rich_text[0]?.plain_text || ""}</p>`;
            if (b.type === 'image') html += `<img src="${b.image.type === 'external' ? b.image.external.url : b.image.file.url}" style="width:100%; border-radius:10px;">`;
        });
        body.innerHTML = html;
    } catch (e) { body.innerHTML = "ERROR"; }
}

function closeModal() { document.getElementById('tutorialModal').style.display = "none"; }
fetchAirdrops();
</script>

</body>
</html>
