<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Tutorial Airdrop - Ōuji Katami</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #111;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .content {
      padding: 40px 20px;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .btn {
      display: inline-block;
      background: #00ff9d;
      color: #000;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 20px;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #00cc7a;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <div class="header">
    <h2 id="title">Satsume Airdrop</h2>
    <a href="drophunting.html">← Kembali ke Drop Hunting</a>
  </div>

  <div class="content">
    <h1 style="font-size: 1.8rem; margin-bottom: 20px;">Tutorial Siap Dibaca</h1>
    <p style="color: #aaa; font-size: 1.05rem; line-height: 1.6;">
      Kamu akan diarahkan ke halaman tutorial lengkap di Notion.
    </p>
    <a href="#" id="openTutorial" class="btn">BUKA TUTORIAL SEKARANG →</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    const airdropsData = [
      {
        "title": "Satsume Airdrop",
        "slug": "satsume",
        "notion_link": "https://determined-casquette-4d9.notion.site/Satsume-Airdrop-335fee4b9562809f82f9fc6e2d51532a"
      }
    ];

    const tutorial = airdropsData.find(item => item.slug === slug);

    if (tutorial) {
      document.getElementById('title').textContent = tutorial.title;
      document.getElementById('openTutorial').href = tutorial.notion_link;
    } else {
      document.getElementById('title').textContent = "Tutorial Tidak Ditemukan";
    }
  </script>
</body>
</html>
