<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Tutorial Airdrop | Ōuji Katami</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: inherit;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .header a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .content {
            padding: 60px 20px 40px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        .cyber-box {
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 40px 30px;
            margin: 30px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #00ff9d, #00cc7a);
            color: #000;
            padding: 16px 40px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3);
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 255, 157, 0.4);
        }

        .icon {
            font-size: 3.5rem;
            color: #00ff9d;
            margin-bottom: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body class="intro-active">

    <!-- Header -->
    <div class="header">
        <h2 id="title">Satsume Airdrop</h2>
        <a href="drophunting.html">
            ← Kembali ke Drop Hunting
        </a>
    </div>

    <div class="content">
        <div class="cyber-box">
            <i class="fas fa-book-open icon"></i>
            
            <h1 style="font-size: 1.85rem; margin-bottom: 16px; letter-spacing: 1px;">
                TUTORIAL READY
            </h1>
            
            <p style="color: #aaa; font-size: 1.05rem; line-height: 1.7; margin-bottom: 35px;">
                Tutorial lengkap <strong id="tutorial-name">Satsume Airdrop</strong> sudah siap.<br>
                Klik tombol di bawah untuk membuka di Notion.
            </p>

            <a href="#" id="openBtn" class="btn" target="_blank">
                <i class="fas fa-external-link-alt"></i> BUKA TUTORIAL DI NOTION
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        const airdropsData = [
          {
            "title": "Satsume Airdrop",
            "slug": "satsume",
            "notion_link": "https://determined-casquette-4d9.notion.site/Satsume-Airdrop-335fee4b9562809f82f9fc6e2d51532a"
          }
        ];

        const tutorial = airdropsData.find(item => item.slug === slug);

        if (tutorial) {
            document.getElementById('title').textContent = tutorial.title;
            document.getElementById('tutorial-name').textContent = tutorial.title;
            document.getElementById('openBtn').href = tutorial.notion_link;
        } else {
            document.getElementById('title').textContent = "Tutorial Tidak Ditemukan";
            document.getElementById('tutorial-name').textContent = "Tidak Ditemukan";
        }
    </script>

    <!-- Script vanta & lainnya (opsional, kalau mau background sama seperti drophunting) -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script> -->

</body>
</html>
