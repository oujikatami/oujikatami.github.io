<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Tutorial Airdrop | Ōuji Katami</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000; /* Hitam pekat sesuai tema */
            color: white;
            font-family: inherit;
            min-height: 100vh;
            overflow: hidden; /* Biar Vanta gak double scroll */
        }

        /* Background Jaring-Jaring Vanta */
        #vanta-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
        }

        .header {
            background: rgba(0, 0, 0, 0.5); /* Lebih transparan */
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .header a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .content {
            padding: 40px 20px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
            height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cyber-box {
            background: rgba(10, 10, 10, 0.7); /* Midnight Glass style */
            border: 1px solid rgba(0, 255, 163, 0.2); /* Border ijo tipis */
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px 30px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #00ffa3; /* Ijo neon murni */
            color: #000;
            padding: 18px 30px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 163, 0.3);
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 255, 163, 0.5);
            background: #fff;
        }

        .icon {
            font-size: 3.5rem;
            color: #00ffa3;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 163, 0.4));
        }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="header">
        <h2 id="title">Satsume Airdrop</h2>
        <a href="drophunting.html">
            ← Kembali ke Drop Hunting
        </a>
    </div>

    <div class="content">
        <div class="cyber-box">
            <i class="fas fa-book-open icon"></i>
            
            <h1 style="font-size: 1.85rem; margin-bottom: 16px; letter-spacing: 1px; font-weight: 900;">
                TUTORIAL READY
            </h1>
            
            <p style="color: #aaa; font-size: 1rem; line-height: 1.6; margin-bottom: 35px;">
                Tutorial lengkap <strong id="tutorial-name" style="color: #fff;">Satsume Airdrop</strong> sudah siap.<br>
                Klik tombol di bawah untuk membuka di Notion.
            </p>

            <a href="#" id="openBtn" class="btn" target="_blank">
                <i class="fas fa-external-link-alt"></i> BUKA TUTORIAL DI NOTION
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <script>
        // Inisialisasi Vanta Net sesuai tema utama lo
        VANTA.NET({
          el: "#vanta-canvas",
          mouseControls: true,
          touchControls: true,
          gyroControls: true,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          scaleMobile: 1.00,
          color: 0x00ffa3,
          backgroundColor: 0x0,
          points: 10.00,
          maxDistance: 20.00,
          spacing: 16.00
        });

        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        const airdropsData = [
          {
            "title": "Satsume Airdrop",
            "slug": "satsume",
            "notion_link": "https://determined-casquette-4d9.notion.site/Satsume-Airdrop-335fee4b9562809f82f9fc6e2d51532a"
          }
        ];

        const tutorial = airdropsData.find(item => item.slug === slug);

        if (tutorial) {
            document.getElementById('title').textContent = tutorial.title;
            document.getElementById('tutorial-name').textContent = tutorial.title;
            document.getElementById('openBtn').href = tutorial.notion_link;
        } else {
            document.getElementById('title').textContent = "Tutorial Tidak Ditemukan";
            document.getElementById('tutorial-name').textContent = "Tidak Ditemukan";
        }
    </script>
</body>
</html>
