<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sell | Crypto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; margin: 0; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        

        #vanta-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
            width: 100vw; 
            height: 100vh; 
        }

        main { 
            position: relative; 
            z-index: 10; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 100px 20px; 
            box-sizing: border-box;
        }

        .cyber-card {
            width: 100%; max-width: 400px; padding: 30px;
            background: rgba(10, 10, 10, 0.65) !important; /* DARI 0.9 KE 0.65 */
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px; 
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        input, select {
            width: 100%; padding: 15px; 
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; color: #fff;
            text-align: center; margin-bottom: 20px; outline: none; 
            font-size: 1rem; font-family: inherit;
        }

        input:focus { border-color: #ff3e3e !important; background: rgba(255, 255, 255, 0.1) !important; }

        .asset-img { width: 60px; height: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255, 62, 62, 0.3)); }
        
        .btn-wa {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; background: #25D366; color: #fff;
            font-size: 0.9rem; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }
    </style> 
</head>
<body class="intro-active">

    <div id="vanta-canvas"></div>

<nav class="top-nav" style="display: flex !important; justify-content: space-between !important; align-items: center !important; padding: 20px !important; height: 80px !important; width: 100%; box-sizing: border-box; background: transparent; position: relative; z-index: 9999 !important;"> 
    <div class="brand-left">
        <a href="retail.html" class="switch-btn-link" style="text-decoration: none; color: #fff; font-size: 0.6rem; font-weight: 800; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);">
            <i class="fas fa-exchange-alt" style="color: #00ffa3; margin-right: 5px;"></i> SWITCH TO BUY
        </a>
    </div>
</nav> 

    <main style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 120px;">
    
    <div style="text-align: center; margin-bottom: 30px; width: 100%;">
        <p style="font-size: 0.55rem; color: #444; letter-spacing: 4px; font-weight: 900; margin: 0; text-transform: uppercase;">
            WELCOME TO <span style="color: #ff3e3e;">SELL</span> TERMINAL
        </p>
        <div style="width: 30px; height: 1px; background: #222; margin: 10px auto;"></div>
    </div> 
        <div id="step1" class="cyber-card">
            <p style="font-size: 0.5rem; color: #444; letter-spacing: 3px; text-align: center; margin-bottom: 15px; font-weight: 800;">SELL SYSTEM</p>
            
            <div style="text-align: center;">
                <img id="assetLogo" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/usdt.png" class="asset-img">
            </div>

            <label style="font-size: 0.5rem; color: #666; display: block; margin-bottom: 5px; text-align: center;">AMOUNT CRYPTO</label>
            <input type="number" id="amountCrypto" placeholder="0.00" oninput="calculate()">

            <select id="assetSelect" onchange="updateUI()">
                <option value="USDT" data-logo="usdt">USDT BASE</option>
                <option value="USDT" data-logo="usdt">USDT BEP20</option>
                <option value="USDC" data-logo="usdc">USDC BASE</option>
                <option value="USDC" data-logo="usdc">USDC BEP20</option>
                <option value="ETH" data-logo="eth">ETHEREUM</option>
                <option value="ETH" data-logo="eth">ETHEREUM BASE</option>
                <option value="ETH" data-logo="eth">ETHEREUM ARBITRUM</option>
                <option value="BNB" data-logo="bnb">BNB</option>
                <option value="SOL" data-logo="sol">SOLANA</option>
                <option value="MATIC" data-logo="matic">POLYGON</option> 
            </select>

            <div style="border: 1px dashed #222; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center;">
                <p style="font-size: 0.5rem; color: #ff3e3e; margin-bottom: 5px; font-weight: 800;">YOU RECEIVE (IDR)</p>
                <h3 id="resAmt" style="font-size: 1.5rem; margin: 0; color: #fff;">Rp 0</h3>
            </div>

            <button onclick="toStep2()" style="width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; letter-spacing: 1px;">PROCEED SELL</button>
        </div>

        <div id="step2" class="cyber-card" style="display: none;">
            <p style="font-size: 0.5rem; color: #444; letter-spacing: 3px; text-align: center; margin-bottom: 20px; font-weight: 800;">YOUR PAYMENT INFO</p>
            
            <div id="sellDetail" style="font-size: 0.75rem; text-align: center; color: #aaa; margin-bottom: 20px; line-height: 1.8;"></div>

            <input type="text" id="userBank" placeholder="Nama Bank / E-Wallet">
            <input type="text" id="userNorek" placeholder="Nomor Rekening / HP">
            <input type="text" id="userName" placeholder="Atas Nama Sesuai Rekening">

            <button class="btn-wa" onclick="sendWA()" style="background: #ff3e3e;">CONFIRM VIA WHATSAPP</button>
            <p onclick="location.reload()" style="font-size: 0.5rem; text-align: center; margin-top: 20px; cursor: pointer; color: #444;">CANCEL</p>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

    <script>
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        // KONFIGURASI BARU (WAVES) BUKAN NET
        VANTA.WAVES({
            el: "#vanta-canvas", 
            mouseControls: true, 
            touchControls: true, 
            gyroControls: true,     
            minHeight: 200.00, 
            minWidth: 200.00, 
            scale: 1.00, 
            scaleMobile: 1.00,
            color: 0x160a2b,        // Warna Ungu Gelap Cyber
            shininess: 35.00,       // Kilau partikel
            waveHeight: 18.00,      // Tinggi gelombang
            waveSpeed: 0.70,        // Kecepatan gerak
            zoom: 0.90
        }); 

        let totalIDR = 0;

        function updateUI() {
            const sel = document.getElementById('assetSelect');
            const logo = sel.options[sel.selectedIndex].getAttribute('data-logo');
            document.getElementById('assetLogo').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${logo}.png`;
            calculate();
        }

        async function calculate() {
            const amt = document.getElementById('amountCrypto').value;
            const crypto = document.getElementById('assetSelect').value;
            if (amt <= 0) { document.getElementById('resAmt').innerText = "Rp 0"; return; }
            try {
                const res = await fetch(`https://min-api.cryptocompare.com/data/price?fsym=${crypto}&tsyms=IDR`);
                const data = await res.json();
                totalIDR = Math.floor((amt * data.IDR) * 0.93);
                document.getElementById('resAmt').innerText = "Rp " + totalIDR.toLocaleString('id-ID');
            } catch(e) { console.log("Price Error"); }
        }

        function toStep2() {
            const amt = document.getElementById('amountCrypto').value;
            if (amt <= 0) return alert("Masukan jumlah koin sob!");
            
            if (totalIDR < 100000) {
                return alert("Minimal penjualan Rp 100.000 bos!");
            }

            document.getElementById('step1').style.display = "none";
            document.getElementById('step2').style.display = "block";
            const asset = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;
            document.getElementById('sellDetail').innerHTML = `YOU SELL: ${amt} ${asset}<br>YOU RECEIVE: Rp ${totalIDR.toLocaleString('id-ID')}`;
        } 

        function sendWA() {
            const amt = document.getElementById('amountCrypto').value;
            const asset = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;
            const bank = document.getElementById('userBank').value;
            const norek = document.getElementById('userNorek').value;
            const name = document.getElementById('userName').value;

            if(!bank || !norek || !name) return alert("Lengkapi data pembayaran lo sob!");

            const msg = encodeURIComponent(`Halo Ouji!\nSAYA MAU JUAL ${asset}.\n\nDetail:\n- Jumlah: ${amt} ${asset}\n- Terima IDR: Rp ${totalIDR.toLocaleString('id-ID')}\n\nData Pembayaran Saya:\n- Bank: ${bank}\n- Norek: ${norek}\n- A.N: ${name}\n\nMohon alamat wallet tujuan buat saya kirim koinnya!`);
            window.open(`https://wa.me/6281556694081?text=${msg}`);
        }
    </script>
</body>
</html>
