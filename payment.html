<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT SERVICE | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .header { position: absolute; top: 30px; left: 30px; font-weight: bold; border-bottom: 2px solid #fff; letter-spacing: 2px; }
        .payment-box { width: 100%; max-width: 450px; border: 1px solid #fff; padding: 40px; background: #000; position: relative; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 11px; letter-spacing: 1px; color: #888; }
        select, input { width: 100%; background: #000; color: #fff; border: 1px solid #fff; padding: 12px; box-sizing: border-box; outline: none; font-family: 'Courier New', monospace; font-size: 14px; transition: 0.3s; }
        select:focus, input:focus { background: #111; border-color: #00ff00; }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 18px; cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #00ff00; color: #000; }
        #status { font-size: 10px; margin-top: 20px; text-align: center; color: #00ff00; text-transform: uppercase; min-height: 15px; }
        .footer-tag { position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <div class="header">PAYMENT SERVICE</div>

    <div class="payment-box">
        <div class="form-group">
            <label>[ SELECT_ASSET ]</label>
            <select id="asset">
                <option value="USDC">USDC (USD COIN)</option>
                <option value="USDT">USDT (TETHER)</option>
            </select>
        </div>

        <div class="form-group">
            <label>[ SELECT_NETWORK ]</label>
            <select id="network">
                <option value="BASE">BASE NETWORK (L2)</option>
                <option value="L1">ETHEREUM MAINNET (L1)</option>
            </select>
        </div>

        <div class="form-group">
            <label>[ TOTAL_AMOUNT ]</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>

        <button id="connectBtn">CONNECT WALLET</button>
        <button id="payBtn" style="display:none;">EXECUTE_PAYMENT</button>
        
        <div id="status">READY_FOR_CONNECTION</div>
    </div>

    <div class="footer-tag">OUJI KATAMI - PAYMENT SERVICE</div> 

    <script> 
        const MY_WALLET = "0x3bcd553ed67ce0cf4bc4fa275a01b22358a0e1b8"; 

        // Daftar Smart Contract Token (Native/Official)
        const CONTRACTS = {
            BASE: {
                USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
                USDT: "0xfde4C9625610ad40273059403dAc834333298972"
            },
            L1: {
                USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",
                USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
            }
        };

        let signer;

        // 1. Logic Connect Wallet (Support OKX & MetaMask)
        document.getElementById('connectBtn').onclick = async () => {
            // Deteksi Provider (OKX Wallet atau MetaMask/Lainnya)
            const provider = window.okxwallet || window.ethereum;

            if (provider) {
                try {
                    const web3Provider = new ethers.providers.Web3Provider(provider);
                    const accounts = await web3Provider.send("eth_requestAccounts", []);
                    signer = web3Provider.getSigner();
                    
                    document.getElementById('connectBtn').style.display = "none";
                    document.getElementById('payBtn').style.display = "block";
                    document.getElementById('status').innerText = "LINKED: " + accounts[0].substring(0,10) + "...";
                } catch (err) {
                    document.getElementById('status').innerText = "CONNECTION_REJECTED";
                }
            } else {
                alert("Wallet not found! Please install OKX Wallet or MetaMask extension.");
            }
        };

        // 2. Logic Execution Payment
        document.getElementById('payBtn').onclick = async () => {
            const asset = document.getElementById('asset').value;
            const network = document.getElementById('network').value;
            const amountInput = document.getElementById('amount').value;
            
            if(!amountInput || amountInput <= 0) {
                alert("Please enter a valid amount!");
                return;
            }

            const contractAddress = CONTRACTS[network][asset];
            const abi = ["function transfer(address to, uint256 amount) public returns (bool)"];
            const contract = new ethers.Contract(contractAddress, abi, signer);

            try {
                document.getElementById('status').innerText = "AWAITING_CONFIRMATION...";
                
                // USDC & USDT di BASE dan L1 rata-rata menggunakan 6 Decimals
                const decimals = 6;
                const parsedAmount = ethers.utils.parseUnits(amountInput, decimals);

                const tx = await contract.transfer(MY_WALLET, parsedAmount);
                
                document.getElementById('status').innerText = "TX_PENDING: " + tx.hash.substring(0,12) + "...";
                
                await tx.wait(); // Nunggu sampe transaksi sukses di blockchain
                document.getElementById('status').innerText = "PAYMENT_SUCCESSFUL";
                alert("Success! Payment sent to Ouji Katami.");
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "TRANSACTION_FAILED";
                alert("Payment error. Make sure you are on the correct network!");
            }
        };
    </script>
</body>
</html>
