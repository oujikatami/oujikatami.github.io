<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff00; --white: #ffffff; --dark: #000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .header-title { font-weight: bold; border-bottom: 2px solid #fff; display: inline-block; margin-bottom: 30px; letter-spacing: 2px; font-size: 12px; }

        /* Sidebar Jasa */
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: #0a0a0a; border-left: 1px solid #333; padding: 60px 20px 20px; transition: 0.3s; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .sidebar.active { right: 0; }
        .toggle-menu { position: fixed; top: 20px; right: 20px; background: #fff; color: #000; padding: 6px 12px; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 101; border: none; }

        .sidebar h3 { font-size: 14px; border-bottom: 1px solid var(--green); padding-bottom: 10px; color: var(--green); margin-bottom: 20px; }
        .svc-item { margin-bottom: 15px; font-size: 11px; line-height: 1.4; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
        .svc-item span { color: #666; display: block; margin-top: 4px; }

        /* Payment Card */
        .card { border: 1px solid #333; padding: 25px; background: #050505; max-width: 400px; margin: 60px auto 0; position: relative; z-index: 10; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 9px; color: #555; margin-bottom: 8px; letter-spacing: 1px; }
        
        .input-box { display: flex; align-items: center; background: #000; border: 1px solid #333; padding: 12px; position: relative; }
        .input-box img { width: 18px; margin-right: 12px; border-radius: 50%; }
        
        /* Select & Input fixes for Mobile */
        select, input { 
            flex: 1; background: transparent; color: #fff; border: none; outline: none; 
            font-family: 'Courier New', monospace; font-size: 14px; -webkit-appearance: none;
            position: relative; z-index: 2;
        }

        .btn { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; border: none; font-family: 'Courier New', monospace; font-size: 13px; margin-top: 10px; transition: 0.2s; }
        #connectBtn { background: #fff; color: #000; }
        #payBtn { background: var(--green); color: #000; display: none; }
        #discBtn { background: transparent; color: #ff4444; border: 1px solid #ff4444; margin-top: 15px; padding: 8px; font-size: 10px; display: none; }
        
        #status { font-size: 10px; text-align: center; margin-top: 20px; color: var(--green); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header-title">PAYMENT SERVICE</div>
<button class="toggle-menu" id="menuTgl">MENU SERVICES</button>

<div class="sidebar" id="sidebar">
    <h3>OUJI KATAMI SEVICE</h3>
    <div class="svc-item"><strong>COMMUNITY MODERATION</strong><span>$120 / WEEK</span></div>
    <div class="svc-item"><strong>CONTENT VIDEO VISUAL</strong><span>$50 / VIDEO</span></div>
    <div class="svc-item"><strong>CRYPTO WRITER MEDIUM</strong><span>$20 / ARTICLE</span></div>
    <div class="svc-item"><strong>CONTEN IDEA X</strong><span>$15 / BUNDLE</span></div>
</div>

<div class="card">
    <div class="group">
        <label>[ 01. SELECT_ASSET ]</label>
        <div class="input-box">
            <img id="assetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
            <select id="assetS">
                <option value="USDC">USDC (USD COIN)</option>
                <option value="USDT">USDT (TETHER)</option>
            </select>
        </div>
    </div>

    <div class="group">
        <label>[ 02. SELECT_NETWORK ]</label>
        <div class="input-box">
            <img id="netImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png">
            <select id="netS">
                <option value="BASE">BASE NETWORK</option>
                <option value="L1">ETHEREUM</option>
            </select>
        </div>
    </div>

    <div class="group">
        <label>[ 03. TOTAL_AMOUNT ]</label>
        <div class="input-box">
            <span style="margin-right:10px; font-size:14px;">$</span>
            <input type="number" id="amtI" placeholder="0.00">
        </div>
    </div>

    <button id="connectBtn" class="btn">CONNECT_DAPP_WALLET</button>
    <button id="payBtn" class="btn">EXECUTE_PAYMENT</button>
    <div id="status">SYSTEM_READY</div>
    <center><button id="discBtn" class="btn">DISCONNECT_WALLET</button></center>
</div>

<script>
    // WALLET TUJUAN (FIXED)
    const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af"; 

    const CONTRACTS = {
        BASE: { USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", USDT: "0xfde4C9625610ad40273059403dAc834333298972" },
        L1: { USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
    };

    let provider, signer;

    // Toggle Sidebar
    document.getElementById('menuTgl').onclick = () => document.getElementById('sidebar').classList.toggle('active');

    // Update Icons
    document.getElementById('assetS').onchange = (e) => {
        const val = e.target.value.toLowerCase();
        document.getElementById('assetImg').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/${val}.png`;
    };

    // Connect Wallet
    document.getElementById('connectBtn').onclick = async () => {
        const p = window.okxwallet || window.ethereum;
        if (!p) return alert("Buka di Browser OKX / MetaMask App, Sob!");

        try {
            document.getElementById('status').innerText = "AUTHORIZING...";
            const accounts = await p.request({ method: 'eth_requestAccounts' });
            
            provider = new ethers.providers.Web3Provider(p, "any");
            signer = provider.getSigner();

            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('payBtn').style.display = "block";
            document.getElementById('discBtn').style.display = "inline-block";
            document.getElementById('status').innerText = "CONNECTED: " + accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
        } catch (err) {
            document.getElementById('status').innerText = "REJECTED";
        }
    };

    // Disconnect (Reset UI)
    document.getElementById('discBtn').onclick = () => {
        provider = null; signer = null;
        document.getElementById('connectBtn').style.display = "block";
        document.getElementById('payBtn').style.display = "none";
        document.getElementById('discBtn').style.display = "none";
        document.getElementById('status').innerText = "DISCONNECTED";
    };

    // Execute Payment
    document.getElementById('payBtn').onclick = async () => {
        const asset = document.getElementById('assetS').value;
        const net = document.getElementById('netS').value;
        const amt = document.getElementById('amtI').value;

        if(!amt || amt <= 0) return alert("Input amount dulu!");

        try {
            document.getElementById('status').innerText = "WAITING_FOR_SIGNATURE...";
            const contract = new ethers.Contract(
                CONTRACTS[net][asset], 
                ["function transfer(address to, uint256 amount) public returns (bool)"], 
                signer
            );
            
            // Kebanyakan Stablecoin pakai 6 decimals
            const tx = await contract.transfer(RECIPIENT, ethers.utils.parseUnits(amt, 6));
            
            document.getElementById('status').innerText = "TRANSACTION_SENT...";
            await tx.wait();
            document.getElementById('status').innerText = "PAYMENT_SUCCESS!";
            alert("Cuan Masuk! Transaksi Berhasil.");
        } catch (err) {
            alert("Error: " + (err.data?.message || err.message));
            document.getElementById('status').innerText = "FAILED";
        }
    };
</script>
</body>
</html>
