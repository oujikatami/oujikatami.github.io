<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    
    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@4.1.5?bundle';
        import { base } from 'https://esm.sh/viem/chains';
        import { getAccount, writeContract, waitForTransactionReceipt, watchAccount, disconnect } from 'https://esm.sh/@wagmi/core';
        import { parseUnits } from 'https://esm.sh/viem';

        const projectId = 'ab391cf7bf5cc56eff69b7a045378fc2'; 

        const metadata = {
            name: 'Ouji Katami',
            description: 'Digital Services',
            url: 'https://oujikatami.xyz',
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        }

        const chains = [base];
        const config = defaultWagmiConfig({ chains, projectId, metadata });
        const modal = createWeb3Modal({ wagmiConfig: config, projectId, chains, themeMode: 'dark' });

        const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af"; 
        const TOKENS = {
            USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
            USDT: "0xfde4C9625610ad40273059403dAc834333298972"
        };

        // Fungsi Global biar bisa dipanggil tombol HTML
        window.openWC = () => modal.open();
        window.exitWC = () => disconnect(config);
        window.payNow = async () => {
            const amt = document.getElementById('amt').value;
            const asset = document.getElementById('selectedAsset').innerText;
            if(!amt || amt <= 0) return alert("ENTER AMOUNT");

            try {
                const hash = await writeContract(config, {
                    address: TOKENS[asset],
                    abi: [{"inputs":[{"name":"to","type":"address"},{"name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}],
                    functionName: 'transfer',
                    args: [RECIPIENT, parseUnits(amt, 6)],
                });
                alert("TRANSACTION SENT!");
                await waitForTransactionReceipt(config, { hash });
                alert("SUCCESSFUL");
            } catch (e) { alert("FAILED"); }
        };

        // Watch Status
        watchAccount(config, {
            onChange(acc) {
                document.getElementById('connectBtn').style.display = acc.isConnected ? 'none' : 'block';
                document.getElementById('payArea').style.display = acc.isConnected ? 'block' : 'none';
            }
        });
    </script>

    <style>
        :root { --green: #00ff00; --white: #fff; --dark: #000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 40px; }
        .sidebar { position: fixed; right: -300px; top: 0; width: 260px; height: 100%; background: #050505; border-left: 1px solid #222; padding: 80px 20px; transition: 0.4s; z-index: 1000; }
        .sidebar.active { right: 0; }
        
        .container { max-width: 400px; margin: 0 auto; }
        .field { margin-bottom: 25px; }
        label { display: block; font-size: 10px; color: #444; margin-bottom: 10px; }
        
        .box { display: flex; align-items: center; background: #111; border: 1px solid #222; padding: 18px; cursor: pointer; }
        .box img { width: 20px; margin-right: 15px; }
        
        input { width: 100%; background: #111; color: #fff; border: 1px solid #222; padding: 18px; outline: none; font-family: monospace; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 20px; font-weight: bold; cursor: pointer; border: none; font-family: monospace; font-size: 12px; margin-top: 10px; }
        .btn-main { background: var(--white); color: var(--dark); }
        .btn-pay { background: var(--green); color: var(--dark); }
        .btn-exit { background: none; color: #ff4444; font-size: 10px; text-decoration: underline; margin-top: 25px; cursor: pointer; }

        .modal-c { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .m-content { background: #0a0a0a; border: 1px solid #222; width: 80%; max-width: 300px; }
        .m-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight:bold; letter-spacing:2px;">OUJI KATAMI</div>
    <button style="background:#fff; font-size:10px; padding:8px 15px; font-weight:bold; cursor:pointer;" onclick="document.getElementById('sb').classList.toggle('active')">OFFERINGS</button>
</div>

<div class="sidebar" id="sb">
    <div style="font-size: 11px; line-height: 2.5;">
        <p style="color: #444;">PRICE LIST</p>
        <div style="display:flex; justify-content:space-between">MODERATION <span style="color:var(--green)">$120/WK</span></div>
        <div style="display:flex; justify-content:space-between">VISUAL VIDEO <span style="color:var(--green)">$50/VID</span></div>
        <div>ARTICLE WRITER <span style="color:var(--green); float:right;">$20/ART</span></div>
        <div>CONTENT STRATEGY <span style="color:var(--green); float:right;">$15/PKG</span></div>
    </div>
</div>

<div class="container">
    <div class="field">
        <label>01. NETWORK (AUTO-BASE)</label>
        <div class="box" style="cursor:default; opacity:0.6;">
            <img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png">
            <span>BASE NETWORK</span>
        </div>
    </div>

    <div class="field">
        <label>02. ASSET SELECTION</label>
        <div class="box" onclick="document.getElementById('am').style.display='flex'">
            <img id="assetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
            <span id="selectedAsset">USDC</span>
        </div>
    </div>

    <div class="field">
        <label>03. AMOUNT_IN_USD</label>
        <input type="number" id="amt" placeholder="0.00">
    </div>

    <button id="connectBtn" class="btn btn-main" onclick="window.openWC()">CONNECT WALLET</button>
    
    <div id="payArea" style="display:none; text-align:center;">
        <button class="btn btn-pay" onclick="window.payNow()">CONFIRM PAYMENT</button>
        <div class="btn-exit" onclick="window.exitWC()">DISCONNECT_WALLET</div>
    </div>
</div>

<div class="modal-c" id="am">
    <div class="m-content">
        <div class="m-item" onclick="setA('USDC')">USDC (BASE)</div>
        <div class="m-item" onclick="setA('USDT')">USDT (BASE)</div>
    </div>
</div>

<script>
    function setA(a) {
        document.getElementById('selectedAsset').innerText = a;
        document.getElementById('assetImg').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/${a.toLowerCase()}.png`;
        document.getElementById('am').style.display = 'none';
    }
</script>

</body>
</html>
