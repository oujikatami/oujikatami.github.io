<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff00; --white: #fff; --dark: #000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { font-weight: bold; border-bottom: 2px solid #fff; display: inline-block; margin-bottom: 25px; font-size: 12px; }
        
        /* Sidebar Jasa */
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: #0a0a0a; border-left: 1px solid #333; padding: 60px 20px; transition: 0.3s; z-index: 1000; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .sidebar.active { right: 0; }
        .toggle-btn { position: fixed; top: 20px; right: 20px; background: #fff; color: #000; padding: 6px 12px; font-size: 10px; z-index: 1001; cursor: pointer; border: none; font-weight: bold; }
        .svc-item { margin-bottom: 15px; font-size: 11px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .svc-item span { color: #666; display: block; margin-top: 5px; }

        /* Card Container */
        .card { border: 1px solid #333; padding: 25px; background: #050505; max-width: 400px; margin: 0 auto; box-sizing: border-box; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 9px; color: #555; margin-bottom: 10px; letter-spacing: 1px; }
        
        /* Custom Clickable Box (Pengganti Dropdown) */
        .click-box { display: flex; align-items: center; background: #000; border: 1px solid #333; padding: 15px; cursor: pointer; position: relative; }
        .click-box img { width: 20px; height: 20px; margin-right: 12px; }
        .val-text { flex: 1; font-size: 14px; }
        .click-box::after { content: '▼'; font-size: 10px; color: #555; }

        input { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 15px; outline: none; font-family: monospace; font-size: 15px; box-sizing: border-box; }

        .btn { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; border: none; font-family: monospace; margin-top: 12px; font-size: 13px; transition: 0.2s; }
        #connectBtn { background: #fff; color: #000; }
        #payBtn { background: var(--green); color: #000; display: none; }
        #status { font-size: 10px; text-align: center; margin-top: 20px; color: var(--green); min-height: 15px; }

        /* Modal Pop-up */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid #333; width: 85%; max-width: 320px; padding: 10px; }
        .m-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .m-item img { width: 20px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="header">PAYMENT_SERVICE_V1.0</div>
<button class="toggle-btn" onclick="document.getElementById('sb').classList.toggle('active')">SERVICES [X]</button>

<div class="sidebar" id="sb">
    <p style="color:var(--green)">[ JASA LAYANAN ]</p>
    <div class="svc-item">MODERATION<span>$120 / WEEK</span></div>
    <div class="svc-item">VIDEO VISUAL<span>$50 / VIDEO</span></div>
    <div class="svc-item">WRITER MEDIUM<span>$20 / ARTICLE</span></div>
    <div class="svc-item">IDE KONTEN X<span>$15 / BUNDLE</span></div>
</div>

<div class="card">
    <div class="group">
        <label>01. ASSET</label>
        <div class="click-box" onclick="openM('asset')">
            <img id="aI" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
            <div class="val-text" id="aT">USDC (USD COIN)</div>
        </div>
    </div>
    
    <div class="group">
        <label>02. NETWORK</label>
        <div class="click-box" onclick="openM('net')">
            <img id="nI" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png">
            <div class="val-text" id="nT">BASE NETWORK</div>
        </div>
    </div>

    <div class="group">
        <label>03. AMOUNT ($)</label>
        <input type="number" id="amt" placeholder="0.00" step="0.01">
    </div>

    <button id="connectBtn" class="btn" onclick="doConnect()">CONNECT_DAPP_WALLET</button>
    <button id="payBtn" class="btn" onclick="doPay()">EXECUTE_PAYMENT</button>
    
    <div id="status">READY</div>
    <center><button id="disc" style="display:none; background:none; color:red; border:none; font-size:10px; margin-top:15px; cursor:pointer;" onclick="location.reload()">DISCONNECT</button></center>
</div>

<div class="modal" id="assetM">
    <div class="modal-content">
        <div class="m-item" onclick="sel('asset', 'USDC')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png"> USDC</div>
        <div class="m-item" onclick="sel('asset', 'USDT')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdt.png"> USDT</div>
    </div>
</div>

<div class="modal" id="netM">
    <div class="modal-content">
        <div class="m-item" onclick="sel('net', 'BASE')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png"> BASE NETWORK</div>
        <div class="m-item" onclick="sel('net', 'L1')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png"> ETHEREUM L1</div>
    </div>
</div>

<script>
    // FIXED WALLET
    const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af"; 
    const CONTRACTS = {
        BASE: { USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", USDT: "0xfde4C9625610ad40273059403dAc834333298972" },
        L1: { USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
    };

    let selectedA = "USDC";
    let selectedN = "BASE";
    let signer;

    function openM(id) { document.getElementById(id + 'M').style.display = 'flex'; }
    function sel(type, val) {
        if(type === 'asset') {
            selectedA = val;
            document.getElementById('aT').innerText = val;
            document.getElementById('aI').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/${val.toLowerCase()}.png`;
        } else {
            selectedN = val;
            document.getElementById('nT').innerText = val + " NETWORK";
        }
        document.getElementById(type + 'M').style.display = 'none';
    }

    async function doConnect() {
        const p = window.okxwallet || window.ethereum;
        if (!p) return alert("Open in OKX Discover Tab!");

        try {
            document.getElementById('status').innerText = "LINKING...";
            const accs = await p.request({ method: 'eth_requestAccounts' });
            
            document.getElementById('status').innerText = "SIGNING...";
            await p.request({
                method: 'personal_sign',
                params: [`AUTH_${new Date().getTime()}`, accs[0]],
            });

            // CRITICAL DELAY: Biar OKX sinkron abis sign
            await new Promise(r => setTimeout(r, 1000));

            const prov = new ethers.providers.Web3Provider(p, "any");
            signer = prov.getSigner();
            
            // Validasi signer
            await signer.getAddress();

            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('payBtn').style.display = "block";
            document.getElementById('disc').style.display = "block";
            document.getElementById('status').innerText = "CONNECTED: " + accs[0].substring(0,6);
        } catch (e) {
            document.getElementById('status').innerText = "ERROR";
            alert("Approval Required or Connection Cancelled.");
        }
    }

    async function doPay() {
        const val = document.getElementById('amt').value;
        if(!val || val <= 0) return alert("Input amount!");

        try {
            document.getElementById('status').innerText = "CONFIRMING...";
            const contract = new ethers.Contract(CONTRACTS[selectedN][selectedA], ["function transfer(address to, uint256 amount) public returns (bool)"], signer);
            
            // Stablecoins use 6 decimals
            const tx = await contract.transfer(RECIPIENT, ethers.utils.parseUnits(val, 6));
            document.getElementById('status').innerText = "PENDING...";
            await tx.wait();
            document.getElementById('status').innerText = "SUCCESS!";
            alert("Payment Sent Successfully!");
        } catch (e) {
            console.error(e);
            alert("Failed: " + (e.data?.message || e.message));
        }
    }
</script>
</body>
</html>
