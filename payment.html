<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT SERVICE | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff00; --white: #ffffff; --dark: #000000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        .header-title { position: absolute; top: 20px; left: 20px; font-weight: bold; border-bottom: 2px solid var(--white); padding-bottom: 5px; font-size: 12px; }

        /* Sidebar Jasa */
        .sidebar-right { position: fixed; right: -300px; top: 0; width: 260px; height: 100%; background: #0a0a0a; border-left: 1px solid #333; padding: 60px 20px 20px; transition: 0.4s; z-index: 999; }
        .sidebar-right.active { right: 0; }
        .menu-toggle { position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 1000; font-weight: bold; background: var(--white); color: var(--dark); padding: 5px 10px; font-size: 12px; }
        
        .sidebar-right h3 { font-size: 14px; border-bottom: 1px solid #444; padding-bottom: 10px; color: var(--green); }
        .service-item { margin-bottom: 15px; font-size: 11px; border-bottom: 1px style solid #222; padding-bottom: 5px; }
        .service-item span { color: #888; display: block; }

        /* Payment Card */
        .main-content { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .payment-card { width: 100%; max-width: 380px; border: 1px solid #333; padding: 25px; background: #050505; z-index: 10; }
        
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 9px; margin-bottom: 8px; color: #888; letter-spacing: 1px; }
        
        /* Select & Input Box */
        .input-wrapper { display: flex; align-items: center; background: #000; border: 1px solid #444; padding: 12px; position: relative; }
        .input-wrapper img { width: 18px; height: 18px; margin-right: 12px; border-radius: 50%; }
        
        /* BIAR BISA DIKLIK DI HP */
        select, input { 
            flex: 1; background: transparent; color: #fff; border: none; outline: none; 
            font-family: 'Courier New', monospace; font-size: 14px; appearance: none; -webkit-appearance: none;
            position: relative; z-index: 5;
        }

        .btn-action { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; margin-top: 10px; border: none; font-size: 13px; }
        #connectBtn { background: var(--white); color: var(--dark); }
        #payBtn { background: var(--green); color: var(--dark); display: none; }
        
        #status { font-size: 10px; text-align: center; margin-top: 15px; color: var(--green); letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header-title">PAYMENT SERVICE</div>
    <div class="menu-toggle" id="toggleBtn">MENU SERVICE</div>

    <div class="sidebar-right" id="sidebar">
        <h3>OUJI KATAMI SERVICE</h3>
        <div class="service-item"><strong>COMMUNITY MODERATION</strong><span>$120 / WEEK</span></div>
        <div class="service-item"><strong>CONTEN VIDEO VISUAL</strong><span>$50 / VIDEO</span></div>
        <div class="service-item"><strong>WRITER MEDIUM</strong><span>$15 / ARTICLE</span></div>
        <div class="service-item"><strong>CONTEN IDEA X</strong><span>$20 / BUNDLE</span></div>
    </div>

    <div class="main-content">
        <div class="payment-card">
            <div class="form-group">
                <label>[ 01. ASSET ]</label>
                <div class="input-wrapper">
                    <img id="assetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
                    <select id="assetSelect">
                        <option value="USDC">USDC (USD COIN)</option>
                        <option value="USDT">USDT (TETHER)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>[ 02. NETWORK ]</label>
                <div class="input-wrapper">
                    <img id="netImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png">
                    <select id="netSelect">
                        <option value="BASE">BASE NETWORK</option>
                        <option value="L1">ETHEREUM L1</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>[ 03. AMOUNT ]</label>
                <div class="input-wrapper">
                    <span style="margin-right:10px">$</span>
                    <input type="number" id="amountInput" placeholder="0.00">
                </div>
            </div>

            <button id="connectBtn" class="btn-action">CONNECT_WALLET</button>
            <button id="payBtn" class="btn-action">EXECUTE_PAYMENT</button>
            <div id="status">SYSTEM_READY</div>
        </div>
    </div>

    <script>
        // GANTI WALLET LO DI SINI!
        const MY_WALLET = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af"; 

        const CONTRACTS = {
            BASE: { USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", USDT: "0xfde4C9625610ad40273059403dAc834333298972" },
            L1: { USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
        };

        // UI Logic
        document.getElementById('toggleBtn').onclick = () => document.getElementById('sidebar').classList.toggle('active');
        
        document.getElementById('assetSelect').onchange = (e) => {
            document.getElementById('assetImg').src = e.target.value === "USDC" 
                ? "https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png" 
                : "https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdt.png";
        };

        // Wallet Logic
        let signer;
        document.getElementById('connectBtn').onclick = async () => {
            const provider = window.okxwallet || window.ethereum;
            if (!provider) return alert("Open in OKX/MetaMask Browser!");

            try {
                document.getElementById('status').innerText = "CONNECTING...";
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                const web3Provider = new ethers.providers.Web3Provider(provider);
                signer = web3Provider.getSigner();

                document.getElementById('connectBtn').style.display = "none";
                document.getElementById('payBtn').style.display = "block";
                document.getElementById('status').innerText = "LINKED: " + accounts[0].substring(0,6);
            } catch (err) {
                document.getElementById('status').innerText = "REJECTED_BY_USER";
            }
        };

        document.getElementById('payBtn').onclick = async () => {
            const asset = document.getElementById('assetSelect').value;
            const net = document.getElementById('netSelect').value;
            const amt = document.getElementById('amountInput').value;
            
            if(!amt || amt <= 0) return alert("Enter Amount!");

            try {
                document.getElementById('status').innerText = "SIGNING_TX...";
                const contract = new ethers.Contract(CONTRACTS[net][asset], ["function transfer(address to, uint256 amount) public returns (bool)"], signer);
                const tx = await contract.transfer(MY_WALLET, ethers.utils.parseUnits(amt, 6));
                document.getElementById('status').innerText = "SENDING...";
                await tx.wait();
                document.getElementById('status').innerText = "SUCCESS!";
                alert("Payment Sent!");
            } catch (err) {
                document.getElementById('status').innerText = "TX_FAILED";
                alert(err.message);
            }
        };
    </script>
</body>
</html>
