<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT SERVICE | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff00; --white: #ffffff; --dark: #000000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header */
        .header-title { position: absolute; top: 20px; left: 20px; font-weight: bold; border-bottom: 2px solid var(--white); padding-bottom: 5px; letter-spacing: 2px; font-size: 14px; }

        /* Sidebar Kanan (Jasa Layanan) */
        .sidebar-right { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: #111; border-left: 1px solid #333; padding: 40px 20px; transition: 0.5s; z-index: 100; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        .sidebar-right.active { right: 0; }
        .menu-toggle { position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 101; font-weight: bold; background: var(--white); color: var(--dark); padding: 5px 10px; }
        
        .sidebar-right h3 { font-size: 16px; border-bottom: 1px solid var(--white); padding-bottom: 10px; margin-bottom: 20px; color: var(--green); }
        .service-item { margin-bottom: 20px; font-size: 12px; line-height: 1.6; }
        .service-item span { display: block; color: #888; }

        /* Main Container */
        .main-content { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .payment-card { width: 100%; max-width: 420px; border: 1px solid #333; padding: 30px; background: #050505; position: relative; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; margin-bottom: 8px; color: #666; letter-spacing: 1px; }
        
        /* Select & Input Styling */
        .custom-select { position: relative; display: flex; align-items: center; background: #000; border: 1px solid #444; padding: 10px; }
        .custom-select img { width: 20px; height: 20px; margin-right: 10px; }
        select, input { width: 100%; background: transparent; color: #fff; border: none; outline: none; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* Button */
        .btn-action { width: 100%; padding: 15px; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; margin-top: 10px; transition: 0.3s; border: none; }
        #connectBtn { background: var(--white); color: var(--dark); }
        #payBtn { background: var(--green); color: var(--dark); display: none; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }

        #status { font-size: 10px; text-align: center; margin-top: 15px; color: var(--green); }
    </style>
</head>
<body>

    <div class="header-title">PAYMENT_SERVICE_V1.0</div>

    <div class="menu-toggle" onclick="toggleSidebar()">SERVICES [X]</div>

    <div class="sidebar-right" id="sidebar">
        <h3>JASA LAYANAN OUJI KATAMI</h3>
        <div class="service-item">
            <strong>COMMUNITY MODERATION</strong>
            <span>$120 / WEEK</span>
        </div>
        <div class="service-item">
            <strong>VISUAL VIDEO CONTENT</strong>
            <span>$50 / VIDEO</span>
        </div>
        <div class="service-item">
            <strong>CRYPTO WRITER (MEDIUM)</strong>
            <span>$20 / ARTICLE</span>
        </div>
        <div class="service-item">
            <strong>CONTENT IDEA (X/TWITTER)</strong>
            <span>$15 / BUNDLE</span>
        </div>
    </div>

    <div class="main-content">
        <div class="payment-card">
            <div class="form-group">
                <label>[ 01. SELECT_ASSET ]</label>
                <div class="custom-select">
                    <img id="assetIcon" src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" alt="">
                    <select id="asset" onchange="updateIcons()">
                        <option value="USDC">USDC (USD COIN)</option>
                        <option value="USDT">USDT (TETHER)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>[ 02. SELECT_NETWORK ]</label>
                <div class="custom-select">
                    <img id="networkIcon" src="https://mint.fun/api/avatar/chain/8453" alt="">
                    <select id="network" onchange="updateIcons()">
                        <option value="BASE">BASE NETWORK</option>
                        <option value="L1">ETHEREUM MAINNET</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>[ 03. TOTAL_AMOUNT ]</label>
                <div class="custom-select">
                    <span style="margin-right:10px; font-size:14px;">$</span>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
            </div>

            <button id="connectBtn" class="btn-action">CONNECT_DAPP_WALLET</button>
            <button id="payBtn" class="btn-action">EXECUTE_PAYMENT</button>
            
            <div id="status">READY_FOR_HANDSHAKE</div>
        </div>
    </div>

    <script>
        // GANTI ALAMAT INI PAKE WALLET LO, SOB!
        const MY_WALLET = "0xALAMAT_WALLET_LO_ASLI_DISINI"; 

        const CONTRACTS = {
            BASE: { USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", USDT: "0xfde4C9625610ad40273059403dAc834333298972" },
            L1: { USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
        };

        let signer;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function updateIcons() {
            const asset = document.getElementById('asset').value;
            const network = document.getElementById('network').value;
            
            document.getElementById('assetIcon').src = asset === "USDC" 
                ? "https://cryptologos.cc/logos/usd-coin-usdc-logo.png" 
                : "https://cryptologos.cc/logos/tether-usdt-logo.png";
            
            document.getElementById('networkIcon').src = network === "BASE" 
                ? "https://mint.fun/api/avatar/chain/8453" 
                : "https://cryptologos.cc/logos/ethereum-eth-logo.png";
        }

        // --- DAPP OPTIMIZED CONNECTION ---
        document.getElementById('connectBtn').onclick = async () => {
            const provider = window.okxwallet || window.ethereum;

            if (provider) {
                try {
                    document.getElementById('status').innerText = "AWAITING_WALLET_APPROVAL...";
                    // Request accounts DULU sebelum inisialisasi ethers
                    const accounts = await provider.request({ method: 'eth_requestAccounts' });
                    
                    const web3Provider = new ethers.providers.Web3Provider(provider);
                    signer = web3Provider.getSigner();

                    document.getElementById('connectBtn').style.display = "none";
                    document.getElementById('payBtn').style.display = "block";
                    document.getElementById('status').innerText = "CONNECTED: " + accounts[0].substring(0,6) + "...";
                } catch (err) {
                    document.getElementById('status').innerText = "CONNECTION_REJECTED";
                }
            } else {
                alert("Please open this page inside OKX or MetaMask Browser tab!");
            }
        };

        document.getElementById('payBtn').onclick = async () => {
            const asset = document.getElementById('asset').value;
            const network = document.getElementById('network').value;
            const amountInput = document.getElementById('amount').value;
            
            if(!amountInput || amountInput <= 0) return alert("Enter amount!");

            const contractAddress = CONTRACTS[network][asset];
            const abi = ["function transfer(address to, uint256 amount) public returns (bool)"];
            const contract = new ethers.Contract(contractAddress, abi, signer);

            try {
                document.getElementById('status').innerText = "CONFIRMING_TRANSACTION...";
                const val = ethers.utils.parseUnits(amountInput, 6);
                const tx = await contract.transfer(MY_WALLET, val);
                document.getElementById('status').innerText = "TX_PENDING...";
                await tx.wait();
                document.getElementById('status').innerText = "PAYMENT_SUCCESSFUL!";
                alert("Payment Received! Thank you.");
            } catch (err) {
                document.getElementById('status').innerText = "TRANSACTION_ERROR";
                alert(err.message);
            }
        };
    </script>
</body>
</html>
