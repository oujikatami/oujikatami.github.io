<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    
    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@4.1.5';
        import { base } from 'https://esm.sh/viem/chains';
        import { getAccount, writeContract, waitForTransactionReceipt, watchAccount, disconnect } from 'https://esm.sh/@wagmi/core';
        import { parseUnits } from 'https://esm.sh/viem';

        const projectId = 'ab391cf7bf5cc56eff69b7a045378fc2'; // Project ID lo

        const metadata = {
            name: 'Ouji Katami',
            description: 'Exclusive Digital Services',
            url: 'https://oujikatami.xyz',
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        }

        const chains = [base];
        const config = defaultWagmiConfig({ chains, projectId, metadata });
        const modal = createWeb3Modal({ wagmiConfig: config, projectId, chains, themeMode: 'dark' });

        const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af";
        const TOKENS = {
            USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
            USDT: "0xfde4C9625610ad40273059403dAc834333298972"
        };

        window.doConnect = () => modal.open();
        window.doDisconnect = async () => {
            await disconnect(config);
            location.reload();
        };

        window.doPay = async () => {
            const amt = document.getElementById('amt').value;
            const asset = document.getElementById('selectedAsset').innerText;
            if(!amt || amt <= 0) return;

            try {
                const account = getAccount(config);
                const hash = await writeContract(config, {
                    address: TOKENS[asset],
                    abi: [{"inputs":[{"name":"to","type":"address"},{"name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}],
                    functionName: 'transfer',
                    args: [RECIPIENT, parseUnits(amt, 6)],
                });
                await waitForTransactionReceipt(config, { hash });
                alert("PAYMENT SUCCESS");
            } catch (e) {
                console.error(e);
            }
        };

        watchAccount(config, {
            onChange(account) {
                if(account.isConnected) {
                    document.getElementById('connectBtn').style.display = 'none';
                    document.getElementById('payArea').style.display = 'block';
                    document.getElementById('disconnectBtn').style.display = 'inline-block';
                } else {
                    document.getElementById('connectBtn').style.display = 'block';
                    document.getElementById('payArea').style.display = 'none';
                    document.getElementById('disconnectBtn').style.display = 'none';
                }
            }
        });
    </script>

    <style>
        :root { --green: #00ff00; --white: #fff; --dark: #000; --grey: #111; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 40px; }
        .brand { font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        
        .sidebar { position: fixed; right: -300px; top: 0; width: 260px; height: 100%; background: #050505; border-left: 1px solid #222; padding: 80px 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .sidebar.active { right: 0; }
        .toggle-menu { background: var(--white); color: var(--dark); padding: 8px 15px; font-size: 10px; cursor: pointer; border: none; font-weight: bold; }

        .service-list { font-size: 11px; line-height: 2.5; }
        .service-list div { border-bottom: 1px solid #111; padding: 10px 0; display: flex; justify-content: space-between; }
        .price { color: var(--green); }

        .container { max-width: 400px; margin: 0 auto; }
        .field { margin-bottom: 25px; }
        label { display: block; font-size: 10px; color: #444; margin-bottom: 10px; }
        
        .selector { display: flex; align-items: center; background: var(--grey); border: 1px solid #222; padding: 18px; cursor: pointer; }
        .selector img { width: 22px; margin-right: 15px; }
        
        input { width: 100%; background: var(--grey); color: #fff; border: 1px solid #222; padding: 18px; outline: none; font-family: monospace; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 20px; font-weight: bold; cursor: pointer; border: none; font-family: monospace; font-size: 12px; letter-spacing: 1px; }
        .btn-main { background: var(--white); color: var(--dark); }
        .btn-pay { background: var(--green); color: var(--dark); }
        .btn-exit { background: none; color: #ff3b3b; font-size: 10px; text-decoration: underline; margin-top: 20px; width: auto; padding: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .m-content { background: #0a0a0a; border: 1px solid #222; width: 80%; max-width: 300px; }
        .m-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="brand">OUJI KATAMI</div>
    <button class="toggle-menu" onclick="document.getElementById('sb').classList.toggle('active')">SERVICES</button>
</div>

<div class="sidebar" id="sb">
    <div class="service-list">
        <p style="letter-spacing: 3px; color: #444; margin-bottom: 20px;">OFFERINGS</p>
        <div><span>MODERATION</span> <span class="price">$120/WK</span></div>
        <div><span>VISUAL VIDEO</span> <span class="price">$50/VID</span></div>
        <div><span>ARTICLE WRITER</span> <span class="price">$20/ART</span></div>
        <div><span>CONTENT STRATEGY</span> <span class="price">$15/PKG</span></div>
    </div>
</div>

<div class="container">
    <div class="field">
        <label>ASSET_SELECTION</label>
        <div class="selector" onclick="document.getElementById('am').style.display='flex'">
            <img id="assetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
            <span id="selectedAsset">USDC</span>
        </div>
    </div>

    <div class="field">
        <label>AMOUNT_TO_PAY</label>
        <input type="number" id="amt" placeholder="0.00">
    </div>

    <button id="connectBtn" class="btn btn-main" onclick="window.doConnect()">CONNECT WALLET</button>
    
    <div id="payArea" style="display:none;">
        <button class="btn btn-pay" onclick="window.doPay()">CONFIRM PAYMENT</button>
        <center><button id="disconnectBtn" class="btn-exit" onclick="window.doDisconnect()">DISCONNECT_ACCOUNT</button></center>
    </div>
</div>

<div class="modal" id="am">
    <div class="m-content">
        <div class="m-item" onclick="setAsset('USDC')">USDC (BASE)</div>
        <div class="m-item" onclick="setAsset('USDT')">USDT (BASE)</div>
    </div>
</div>

<script>
    function setAsset(a) {
        document.getElementById('selectedAsset').innerText = a;
        document.getElementById('assetImg').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/${a.toLowerCase()}.png`;
        document.getElementById('am').style.display = 'none';
    }
</script>

</body>
</html>
