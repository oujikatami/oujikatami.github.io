<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        :root { --green: #00ff00; --white: #fff; --dark: #000; }
        body { background: var(--dark); color: var(--white); font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; }
        .header { font-weight: bold; border-bottom: 2px solid #fff; display: inline-block; margin-bottom: 20px; font-size: 12px; }
        
        /* Card & UI */
        .card { border: 1px solid #333; padding: 20px; background: #050505; max-width: 380px; margin: 0 auto; position: relative; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 9px; color: #555; margin-bottom: 5px; }
        
        /* Box Klik-able */
        .clickable-box { display: flex; align-items: center; background: #000; border: 1px solid #333; padding: 15px; cursor: pointer; position: relative; }
        .clickable-box:active { border-color: var(--green); }
        .clickable-box img { width: 20px; margin-right: 12px; }
        .display-text { flex: 1; font-size: 14px; color: #fff; }

        input { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 15px; outline: none; font-family: monospace; font-size: 14px; box-sizing: border-box; }

        .btn { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; border: none; font-family: monospace; margin-top: 10px; font-size: 13px; }
        #connectBtn { background: #fff; color: #000; }
        #payBtn { background: var(--green); color: #000; display: none; }
        #status { font-size: 10px; text-align: center; margin-top: 15px; color: var(--green); }

        /* MODAL CUSTOM (PENGGANTI DROPDOWN) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid #333; width: 80%; max-width: 300px; padding: 20px; }
        .modal-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .modal-item:hover { background: #222; }
        .modal-item img { width: 20px; margin-right: 15px; }

        /* Sidebar */
        .sidebar { position: fixed; right: -280px; top: 0; width: 250px; height: 100%; background: #0a0a0a; border-left: 1px solid #333; padding: 60px 20px; transition: 0.3s; z-index: 1000; }
        .sidebar.active { right: 0; }
        .toggle { position: fixed; top: 20px; right: 20px; background: #fff; color: #000; padding: 6px 12px; font-size: 10px; z-index: 1001; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">PAYMENT_SERVICE_V1.0</div>
<div class="toggle" onclick="document.getElementById('sb').classList.toggle('active')">SERVICES [X]</div>

<div class="sidebar" id="sb">
    <p style="color:var(--green)">[ JASA LAYANAN ]</p>
    <small>MODERATION: $120/WK<br>VIDEO: $50/VID<br>WRITER: $20<br>IDE X: $15</small>
</div>

<div class="card">
    <div class="group">
        <label>01. ASSET</label>
        <div class="clickable-box" onclick="openModal('asset')">
            <img id="curAssetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png">
            <div class="display-text" id="curAssetTxt">USDC (USD COIN)</div>
        </div>
    </div>
    
    <div class="group">
        <label>02. NETWORK</label>
        <div class="clickable-box" onclick="openModal('net')">
            <img id="curNetImg" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png">
            <div class="display-text" id="curNetTxt">BASE NETWORK</div>
        </div>
    </div>

    <div class="group">
        <label>03. AMOUNT ($)</label>
        <input type="number" id="amtInput" placeholder="0.00">
    </div>

    <button id="connectBtn" class="btn" onclick="connectWallet()">CONNECT_DAPP_WALLET</button>
    <button id="payBtn" class="btn" onclick="executePayment()">EXECUTE_PAYMENT</button>
    <div id="status">SYSTEM_READY</div>
    <center><button id="discBtn" style="display:none; background:none; color:red; border:none; font-size:10px; margin-top:10px;" onclick="location.reload()">DISCONNECT</button></center>
</div>

<div class="modal" id="assetModal">
    <div class="modal-content">
        <div class="modal-item" onclick="selectItem('asset', 'USDC')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdc.png"> USDC</div>
        <div class="modal-item" onclick="selectItem('asset', 'USDT')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/usdt.png"> USDT</div>
    </div>
</div>

<div class="modal" id="netModal">
    <div class="modal-content">
        <div class="modal-item" onclick="selectItem('net', 'BASE')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png"> BASE NETWORK</div>
        <div class="modal-item" onclick="selectItem('net', 'L1')"><img src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/eth.png"> ETHEREUM L1</div>
    </div>
</div>

<script>
    const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af"; 
    const CONTRACTS = {
        BASE: { USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913", USDT: "0xfde4C9625610ad40273059403dAc834333298972" },
        L1: { USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7" }
    };

    let selectedAsset = "USDC";
    let selectedNet = "BASE";
    let sign;

    function openModal(type) {
        document.getElementById(type + 'Modal').style.display = 'flex';
    }

    function selectItem(type, val) {
        if(type === 'asset') {
            selectedAsset = val;
            document.getElementById('curAssetTxt').innerText = val;
            document.getElementById('curAssetImg').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/white/${val.toLowerCase()}.png`;
        } else {
            selectedNet = val;
            document.getElementById('curNetTxt').innerText = val + " NETWORK";
        }
        document.getElementById(type + 'Modal').style.display = 'none';
    }

    async function connectWallet() {
        const p = window.okxwallet || window.ethereum;
        if (!p) return alert("Buka di App OKX/MetaMask!");

        try {
            document.getElementById('status').innerText = "SIGNING...";
            const accounts = await p.request({ method: 'eth_requestAccounts' });
            
            // Sign biar OKX Mobile 'bangun'
            await p.request({
                method: 'personal_sign',
                params: [`VERIFY_PAYMENT_${new Date().getTime()}`, accounts[0]],
            });

            const prov = new ethers.providers.Web3Provider(p, "any");
            sign = prov.getSigner();

            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('payBtn').style.display = "block";
            document.getElementById('discBtn').style.display = "block";
            document.getElementById('status').innerText = "LINKED: " + accounts[0].substring(0,6);
        } catch (err) {
            document.getElementById('status').innerText = "FAILED";
            alert("Approval Required!");
        }
    }

    async function executePayment() {
        const amt = document.getElementById('amtInput').value;
        if(!amt || amt <= 0) return alert("Isi nominal!");

        try {
            document.getElementById('status').innerText = "CONFIRMING...";
            const contract = new ethers.Contract(CONTRACTS[selectedNet][selectedAsset], ["function transfer(address to, uint256 amount) public returns (bool)"], sign);
            const tx = await contract.transfer(RECIPIENT, ethers.utils.parseUnits(amt, 6));
            document.getElementById('status').innerText = "PENDING...";
            await tx.wait();
            document.getElementById('status').innerText = "SUCCESS!";
            alert("Payment Sent!");
        } catch (err) {
            document.getElementById('status').innerText = "ERROR";
            alert(err.message);
        }
    }
</script>
</body>
</html>
