<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYMENT | OUJI KATAMI</title>
    
    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@4.1.5?bundle';
        import { base, mainnet, arbitrum } from 'https://esm.sh/viem/chains';
        import { reconnect, watchAccount, disconnect, switchChain, writeContract, waitForTransactionReceipt } from 'https://esm.sh/@wagmi/core';
        import { parseUnits } from 'https://esm.sh/viem';

        // DATA LO
        const projectId = 'ab391cf7bf5cc56eff69b7a045378fc2';
        const RECIPIENT = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af";

        const chains = [base, mainnet, arbitrum];
        const config = defaultWagmiConfig({ 
            chains, 
            projectId, 
            metadata: { 
                name: 'OUJI KATAMI', 
                description: 'Digital Services',
                url: 'https://oujikatami.xyz',
                icons: ['https://avatars.githubusercontent.com/u/37784886']
            } 
        });

        const modal = createWeb3Modal({ wagmiConfig: config, projectId, themeMode: 'dark' });

        const TOKEN_MAP = {
            'BASE': { USDC: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', USDT: '0xfde4C9625610ad40273059403dAc834333298972', USDE: '0x5d3a1Ff2b6BAbF766796a94162795812960596ef' },
            'ETHEREUM': { USDC: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eb48', USDT: '0xdAC17F958D2ee523a2206206994597C13D831ec7', USDE: '0x4c9edd5852cd30587322aa08cd46290453d718b' },
            'ARBITRUM': { USDC: '0xaf88d065e77c8cC2239327C5EDb3A432268e5831', USDT: '0xFd086bC7CD5C081DD8310798130121C594281093', USDE: '0x211Cc4DD45680ac8346761494052309C2f80698F' }
        };

        // FUNGSI INI DITARUH DI WINDOW BIAR TOMBOL HTML BISA MANGGIL
        window.connectWallet = async () => {
            try { await modal.open(); } catch (e) { alert("Check Reown Project ID / Domain Allowlist"); }
        };

        window.disconnectWallet = () => disconnect(config);

        window.processPayment = async () => {
            const net = document.getElementById('netSelect').value;
            const asset = document.getElementById('assetSelect').value;
            const amt = document.getElementById('amtInput').value;
            if(!amt || amt <= 0) return alert("ENTER VALID AMOUNT");

            try {
                const chainIdMap = { 'BASE': 8453, 'ETHEREUM': 1, 'ARBITRUM': 42161 };
                await switchChain(config, { chainId: chainIdMap[net] });

                const hash = await writeContract(config, {
                    address: TOKEN_MAP[net][asset],
                    abi: [{"inputs":[{"name":"to","type":"address"},{"name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}],
                    functionName: 'transfer',
                    args: [RECIPIENT, parseUnits(amt, 6)],
                });
                alert("TRANSACTION SENT!");
                await waitForTransactionReceipt(config, { hash });
                alert("SUCCESSFUL!");
            } catch (e) { alert("TRANSACTION FAILED"); }
        };

        watchAccount(config, {
            onChange(acc) {
                document.getElementById('connectBtn').style.display = acc.isConnected ? 'none' : 'block';
                document.getElementById('actionArea').style.display = acc.isConnected ? 'block' : 'none';
            }
        });
    </script>

    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; padding: 25px; margin: 0; }
        .title { font-weight: bold; letter-spacing: 2px; margin-bottom: 30px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; max-width: 500px; }
        th, td { border: 1px solid #222; padding: 12px; font-size: 11px; text-align: left; }
        th { background: #111; color: #555; text-transform: uppercase; }
        .price { color: #00ff00; text-align: right; }
        select, input { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 10px; font-family: monospace; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; border: none; font-family: monospace; font-size: 12px; }
        .btn-connect { background: #fff; color: #000; }
        .btn-pay { background: #00ff00; color: #000; }
        .btn-disconnect { background: none; color: #ff4444; font-size: 10px; text-decoration: underline; margin-top: 25px; cursor: pointer; border:none; width: 100%; }
    </style>
</head>
<body>

    <div class="title">OUJI KATAMI SERVICES</div>

    <table>
        <thead><tr><th>SERVICE</th><th style="text-align:right">PRICELIST</th></tr></thead>
        <tbody>
            <tr><td>COMMUNITY MODERATION</td><td class="price">$100/WEEK</td></tr>
            <tr><td>VIDEO CONTENT</td><td class="price">$30/VIDEO</td></tr>
            <tr><td>CONTENT IDEA X</td><td class="price">$20/CONTENT</td></tr>
            <tr><td>CRYPTO WRITER MEDIUM</td><td class="price">$15/CONTENT</td></tr>
        </tbody>
    </table>

    <table>
        <thead><tr><th colspan="2">PAYMENT DETAILS</th></tr></thead>
        <tbody>
            <tr><td>NETWORK</td><td><select id="netSelect"><option value="BASE">BASE</option><option value="ETHEREUM">ETHEREUM</option><option value="ARBITRUM">ARBITRUM</option></select></td></tr>
            <tr><td>ASSET</td><td><select id="assetSelect"><option value="USDC">USDC</option><option value="USDT">USDT</option><option value="USDE">USDE</option></select></td></tr>
            <tr><td>AMOUNT</td><td><input type="number" id="amtInput" placeholder="0.00"></td></tr>
        </tbody>
    </table>

    <button id="connectBtn" class="btn btn-connect" onclick="window.connectWallet()">CONNECT WALLET</button>
    
    <div id="actionArea" style="display:none; text-align:center;">
        <button class="btn btn-pay" onclick="window.processPayment()">EXECUTE PAYMENT</button>
        <button class="btn-disconnect" onclick="window.disconnectWallet()">DISCONNECT_WALLET</button>
    </div>

</body>
</html>
