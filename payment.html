<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Service | Ouji Katami</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 40px; }
        .header { position: absolute; top: 20px; left: 20px; font-weight: bold; border-bottom: 1px solid #fff; }
        .container { max-width: 400px; margin: 100px auto; border: 1px solid #fff; padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; }
        select, input { width: 100%; background: #000; color: #fff; border: 1px solid #fff; padding: 10px; box-sizing: border-box; outline: none; font-family: monospace; }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; font-family: monospace; }
        button:hover { background: #ccc; }
        #status { font-size: 11px; margin-top: 15px; text-align: center; color: #00ff00; }
    </style>
</head>
<body>

    <div class="header">PAYMENT SERVICE</div>

    <div class="container">
        <div class="form-group">
            <label>SELECT ASSET</label>
            <select id="asset">
                <option value="USDC">USDC</option>
                <option value="USDT">USDT</option>
            </select>
        </div>

        <div class="form-group">
            <label>SELECT NETWORK</label>
            <select id="network">
                <option value="BASE">BASE NETWORK</option>
                <option value="L1">ETHEREUM MAINNET (L1)</option>
            </select>
        </div>

        <div class="form-group">
            <label>TOTAL AMOUNT</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>

        <button id="connectBtn">CONNECT WALLET</button>
        <button id="payBtn" style="display:none;">SEND PAYMENT</button>
        
        <div id="status"></div>
    </div>

    <script>
        const MY_WALLET = "0x3bcd553ed67ce0cf4bc4fa275a01b22358a0e1b8" 
        
        const CONTRACTS = {
            BASE: {
                USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
                USDT: "0xfde4C9625610ad40273059403dAc834333298972"
            },
            L1: {
                USDC: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",
                USDT: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
            }
        };

        let signer;

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                document.getElementById('connectBtn').style.display = "none";
                document.getElementById('payBtn').style.display = "block";
                document.getElementById('status').innerText = "Wallet Connected";
            } else {
                alert("Please install MetaMask!");
            }
        };

        document.getElementById('payBtn').onclick = async () => {
            const asset = document.getElementById('asset').value;
            const network = document.getElementById('network').value;
            const amount = document.getElementById('amount').value;
            
            if(!amount || amount <= 0) return alert("Enter amount!");

            const contractAddress = CONTRACTS[network][asset];
            const abi = ["function transfer(address to, uint256 amount) public returns (bool)"];
            const contract = new ethers.Contract(contractAddress, abi, signer);

            try {
                document.getElementById('status').innerText = "Waiting for confirmation...";
                // USDC & USDT average 6 decimals on these networks
                const val = ethers.utils.parseUnits(amount, 6); 
                const tx = await contract.transfer(MY_WALLET, val);
                document.getElementById('status').innerText = "Transaction Sent! Hash: " + tx.hash.substring(0,10) + "...";
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Payment Failed!";
            }
        };
    </script>
</body>
</html>
