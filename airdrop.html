<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRDROP TUTORIAL | OUJI KATAMI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tutorial-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 30px; }
        #contentContainer { padding: 0 20px 80px 20px; max-width: 600px; margin: 0 auto; color: #ccc; line-height: 1.8; font-size: 0.9rem; }
        #contentContainer img { width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid #333; }
        #contentContainer h2 { color: #fff; margin: 30px 0 10px; font-size: 1.2rem; }
        #contentContainer p { margin-bottom: 15px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; font-weight: 800; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body style="background: #000; font-family: inherit;">

    <div class="tutorial-header">
        <a href="drophunting.html" class="back-btn">← BACK TO LIST</a>
        <h1 id="tutorialTitle" style="color: #fff; font-size: 1.2rem; margin-top: 20px; letter-spacing: 2px;">LOADING...</h1>
        <p id="tutorialTags" style="font-size: 0.6rem; color: #444; margin-top: 10px;"></p>
    </div>

    <div id="contentContainer">
        </div>

    <script>
        // DATA KUNCI
        const TOKEN = "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";
        const PROXY = "https://api.allorigins.win/get?url=";

        // 1. Ambil ID dari URL (Contoh: airdrop.html?id=abcde)
        const urlParams = new URLSearchParams(window.location.search);
        const pageId = urlParams.get('id');

        if (!pageId) {
            document.getElementById('tutorialTitle').innerText = "TUTORIAL NOT FOUND";
        } else {
            loadTutorialData(pageId);
        }

        async function loadTutorialData(id) {
            const container = document.getElementById('contentContainer');
            
            try {
                // A. Taruh Judul (Page Info)
                const pageRes = await fetch(PROXY + encodeURIComponent(`https://api.notion.com/v1/pages/${id}`), {
                    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28' }
                });
                const pageJson = await pageRes.json();
                const pageData = JSON.parse(pageJson.contents);
                
                document.getElementById('tutorialTitle').innerText = pageData.properties["AIRDROP NAME"].title[0].plain_text.toUpperCase();
                document.getElementById('tutorialTags').innerText = pageData.properties["TAGS"].multi_select.map(t => t.name).join(" • ").toUpperCase();

                // B. Taruh Isi (Blocks/Content)
                const blocksRes = await fetch(PROXY + encodeURIComponent(`https://api.notion.com/v1/blocks/${id}/children`), {
                    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28' }
                });
                const blocksJson = await blocksRes.json();
                const blocksData = JSON.parse(blocksJson.contents);

                let html = "";
                blocksData.results.forEach(block => {
                    if (block.type === 'paragraph') {
                        const text = block.paragraph.rich_text.map(t => t.plain_text).join("");
                        html += `<p>${text}</p>`;
                    } else if (block.type === 'heading_2') {
                        html += `<h2>${block.heading_2.rich_text[0].plain_text}</h2>`;
                    } else if (block.type === 'image') {
                        const imgUrl = block.image.type === 'external' ? block.image.external.url : block.image.file.url;
                        html += `<img src="${imgUrl}" alt="Tutorial Step">`;
                    }
                });
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = "<p style='color:red; text-align:center;'>FAILED TO FETCH TUTORIAL DATA.</p>";
            }
        }
    </script>
</body>
</html>
