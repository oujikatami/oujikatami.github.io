<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buy | Crypto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; margin: 0; overflow-x: hidden; }
        #vanta-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        main { position: relative; z-index: 10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px; box-sizing: border-box;}
        .cyber-card {
            width: 100%; max-width: 400px; padding: 30px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; backdrop-filter: blur(15px);
        }
        input, select {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03);
            border: 1px solid #222; border-radius: 12px; color: #fff;
            text-align: center; margin-bottom: 20px; outline: none; font-size: 1rem; font-family: inherit;
        }
        input:focus { border-color: #00ffa3; }
        .asset-img { width: 60px; height: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .bank-list { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #222; margin: 20px 0; }
        .bank-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.8rem; }
        .btn-wa {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; background: #25D366; color: #fff;
            font-size: 0.9rem; letter-spacing: 1px;
        }
    </style>
</head>
<body class="intro-active">

    <div id="vanta-canvas"></div>
    
    <nav class="top-nav">
        <a href="sell.html" class="switch-btn-link"> 
    </div> 
        
    <div class="menu-btn" onclick="toggleMenu()">
        <div class="bar"></div><div class="bar"></div>
    </div> 
    
    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()"> 
            
        </div>
        <div class="drawer-content" style="padding-left: 25px !important; padding-top: 15px !important;">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="drophunting.html">DROP HUNTING</a>
                <a href="market.html">CRYPTO MARKET</a> 
            </div>
        </div>
    </div>

    <main>
        <div id="step1" class="cyber-card">
            <p style="font-size: 0.5rem; color: #444; letter-spacing: 3px; text-align: center; margin-bottom: 15px; font-weight: 800;">ORDER SYSTEM</p>
            
            <div style="text-align: center;">
                <img id="assetLogo" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/eth.png" class="asset-img">
            </div>

            <input type="number" id="amountIDR" placeholder="Min. 30,000" oninput="calculate()">

            <select id="assetSelect" onchange="updateUI()">
                <option value="ETH" data-logo="eth">ETHEREUM</option>
                <option value="ETH" data-logo="eth">ETHEREUM BASE</option>
                <option value="ETH" data-logo="eth">ETHEREUM ARBITRUM</option>
                <option value="BNB" data-logo="bnb">BNB BEP20</option>
                <option value="SOL" data-logo="sol">SOLANA</option>
                <option value="MATIC" data-logo="matic">POLYGON</option>
                <option value="USDT" data-logo="usdt">USDT BASE</option>
                <option value="USDC" data-logo="usdc">USDC BASE</option>
                <option value="USDT" data-logo="usdt">USDT BEP20</option>
                <option value="USDC" data-logo="usdc">USDC BEP20</option> 
            </select>

            <div style="border: 1px dashed #222; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center;">
                <p style="font-size: 0.5rem; color: #00ffa3; margin-bottom: 5px; font-weight: 800;">ESTIMATION RECEIVED</p>
                <h3 id="resAmt" style="font-size: 1.5rem; margin: 0; color: #fff;">0.0000</h3>
            </div>

            <button onclick="toStep2()" style="width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; letter-spacing: 1px;">PROCEED</button>
        </div>

        <div id="step2" class="cyber-card" style="display: none;">
            <p style="font-size: 0.5rem; color: #444; letter-spacing: 3px; text-align: center; margin-bottom: 20px; font-weight: 800;">INVOICE</p>
            <div id="orderInfo" style="font-size: 0.75rem; text-align: center; color: #aaa; margin-bottom: 20px; line-height: 1.8;"></div>
            <div class="bank-list">
                <div class="bank-item"><i class="fas fa-university"></i> BRI: 369501052082539</div>
                <div class="bank-item"><i class="fas fa-university"></i> MANDIRI: 1390030938686</div>
                <div class="bank-item"><i class="fas fa-university"></i> BNI: 1955102534</div>
                <div class="bank-item"><i class="fas fa-wallet"></i> SHOPEEPAY: 081556694081</div>
                <p style="font-size: 0.55rem; color: #00ffa3; text-align: center; margin-top: 15px; font-weight: 800; letter-spacing: 1px;">A.N DONI NOVRIANDI</p>
            </div>
            <button class="btn-wa" onclick="sendWA()">CONFIRM WHATSAPP</button>
            <p onclick="location.reload()" style="font-size: 0.5rem; text-align: center; margin-top: 20px; cursor: pointer; color: #444;">CANCEL</p>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        VANTA.NET({
            el: "#vanta-canvas", mouseControls: true, touchControls: true, gyroControls: false,
            minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
            color: 0xffffff, backgroundColor: 0x0, points: 10.00, maxDistance: 20.00, spacing: 15.00
        });

        let finalAmt = 0;

        function updateUI() {
            const sel = document.getElementById('assetSelect');
            const logo = sel.options[sel.selectedIndex].getAttribute('data-logo');
            document.getElementById('assetLogo').src = `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${logo}.png`;
            calculate();
        }

        async function calculate() {
            const idr = document.getElementById('amountIDR').value;
            const crypto = document.getElementById('assetSelect').value;
            if (idr < 1000) return;
            try {
                // PAKE CRYPTOCOMPARE - LEBIH REALTIME & KENCENG
                const res = await fetch(`https://min-api.cryptocompare.com/data/price?fsym=${crypto}&tsyms=IDR`);
                const data = await res.json();
                const netIdr = idr * 0.92; 
                finalAmt = (netIdr / data.IDR).toFixed(6);
                document.getElementById('resAmt').innerText = finalAmt;
            } catch(e) { console.log("Price Error"); }
        }

        function toStep2() {
            const idr = document.getElementById('amountIDR').value;
            if (idr < 30000) return alert("Min. 30rb bos!");
            document.getElementById('step1').style.display = "none";
            document.getElementById('step2').style.display = "block";
            const asset = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;
            document.getElementById('orderInfo').innerHTML = `ORDER: ${asset}<br>NOMINAL: RP ${parseInt(idr).toLocaleString('id-ID')}<br>RECEIVE: ${finalAmt}`;
        }

        function sendWA() {
            const idr = document.getElementById('amountIDR').value;
            const asset = document.getElementById('assetSelect').options[document.getElementById('assetSelect').selectedIndex].text;
            const msg = encodeURIComponent(`Halo Ouji!\nSaya mau order ${asset}.\nNominal: Rp ${parseInt(idr).toLocaleString('id-ID')}\nEstimasi: ${finalAmt}\n\nSudah transfer ya dan ini bukti transfernya!`);
            window.open(`https://wa.me/6281556694081?text=${msg}`);
        }
    </script> 
</body>
        <a href="sell.html" class="switch-btn"> 
    <i class="fas fa-exchange-alt"></i> SWITCH TO SELL
    </a> 
</html>
