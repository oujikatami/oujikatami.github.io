<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

        input:focus, select:focus { border-color: #00ffa3 !important; }
        .asset-icon { font-size: 2rem; color: #fff; margin-bottom: 15px; display: block; text-align: center; }
        .payment-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .payment-row i { width: 25px; color: #666; font-size: 1.1rem; }
        .payment-info { flex: 1; }
    </style>
</head>
<body class="intro-active">

    <div id="intro-overlay"></div>

    <nav class="top-nav">
        <div class="brand-left">RETAIL <span style="color: #666;">CRYPTO</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()">×</div>
        <div class="drawer-content" style="padding-left: 25px !important; padding-top: 15px !important;">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="drophunting.html">DROP HUNTING</a>
                <a href="market.html">CRYPTO MARKET</a>  
            </div>
        </div>
    </div>

    <main id="scroller" style="position: relative; z-index: 10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 20px;">
        <div class="container" style="width: 100%; max-width: 400px;">
            
            <div id="step1" class="cyber-box" style="padding: 30px; background: rgba(10,10,10,0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;">
                <p style="font-size: 0.6rem; color: #444; letter-spacing: 3px; text-align: center; margin-bottom: 25px; font-weight: 800;">ORDER SYSTEM</p>
                
                <div class="asset-icon" id="mainIcon"><i class="fab fa-ethereum"></i></div>

                <label style="font-size: 0.55rem; color: #666; display: block; margin-bottom: 8px; letter-spacing: 1px;">NOMINAL (IDR)</label>
                <input type="number" id="amountIDR" placeholder="Min. 50,000" oninput="calculateCrypto()" 
                       style="width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; color: #fff; text-align: center; font-size: 1.1rem; outline: none; margin-bottom: 20px;">

                <label style="font-size: 0.55rem; color: #666; display: block; margin-bottom: 8px; letter-spacing: 1px;">SELECT ASSET</label>
                <select id="cryptoSelect" onchange="updateIcon(); calculateCrypto();" style="width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; color: #fff; outline: none; margin-bottom: 20px; text-align-last: center;">
                    <option value="ethereum" data-icon="fa-ethereum">ETHEREUM (L1)</option>
                    <option value="ethereum" data-icon="fa-ethereum">ETHEREUM (BASE)</option>
                    <option value="ethereum" data-icon="fa-ethereum">ETHEREUM (ARBITRUM)</option>
                    <option value="binancecoin" data-icon="fa-bitcoin">BNB (BEP20)</option>
                    <option value="solana" data-icon="fa-connectdevelop">SOLANA</option>
                    <option value="matic-network" data-icon="fa-layer-group">POLYGON (MATIC)</option>
                </select>

                <div style="background: rgba(0,255,163,0.02); border: 1px dashed rgba(0,255,163,0.2); padding: 20px; border-radius: 15px; margin-bottom: 25px; text-align: center;">
                    <p style="font-size: 0.5rem; color: #00ffa3; letter-spacing: 2px; margin-bottom: 5px;">YOU RECEIVE APPROX:</p>
                    <h3 id="cryptoResult" style="font-size: 1.5rem; color: #fff; font-weight: 800;">0.0000</h3>
                </div>

                <button onclick="goToStep2()" style="width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 900; letter-spacing: 2px; cursor: pointer;">PROCEED TO PAYMENT</button>
            </div>

            <div id="step2" class="cyber-box" style="padding: 30px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; display: none;">
                <p style="font-size: 0.6rem; color: #666; letter-spacing: 3px; text-align: center; margin-bottom: 25px; font-weight: 800;">INVOICE DETAILS</p>
                
                <div id="invoiceDetail" style="font-size: 0.75rem; color: #aaa; line-height: 1.8; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 20px; text-align: center;"></div>

                <p style="font-size: 0.55rem; color: #444; text-align: center; margin-bottom: 15px; letter-spacing: 1px;">TRANSFER TO:</p>
                
                <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid #222;">
                    <div class="payment-row">
                        <i class="fas fa-university"></i>
                        <div class="payment-info"><span style="font-size: 0.6rem; color:#666;">BRI</span><br><span style="font-size: 0.8rem; color:#fff;">369501052082539</span></div>
                    </div>
                    <div class="payment-row">
                        <i class="fas fa-building-columns"></i>
                        <div class="payment-info"><span style="font-size: 0.6rem; color:#666;">MANDIRI</span><br><span style="font-size: 0.8rem; color:#fff;">1390030938686</span></div>
                    </div>
                    <div class="payment-row">
                        <i class="fas fa-landmark"></i>
                        <div class="payment-info"><span style="font-size: 0.6rem; color:#666;">BNI</span><br><span style="font-size: 0.8rem; color:#fff;">1955102534</span></div>
                    </div>
                    <div class="payment-row">
                        <i class="fas fa-wallet"></i>
                        <div class="payment-info"><span style="font-size: 0.6rem; color:#666;">SHOPEEPAY</span><br><span style="font-size: 0.8rem; color:#fff;">081556694081</span></div>
                    </div>
                    <p style="color:#00ffa3; font-size: 0.55rem; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; text-align: center; font-weight: 800; letter-spacing: 1px;">A.N DONI NOVRIANDI</p>
                </div>

                <div style="margin-top: 25px;">
                    <button onclick="confirmOrder('wa')" style="width: 100%; padding: 15px; background: #25D366; color: #fff; border: none; border-radius: 10px; font-weight: 800; margin-bottom: 12px; cursor: pointer;"><i class="fab fa-whatsapp"></i> CONFIRM VIA WHATSAPP</button>
                    <button onclick="confirmOrder('email')" style="width: 100%; padding: 15px; background: #333; color: #fff; border: none; border-radius: 10px; font-weight: 800; cursor: pointer;"><i class="far fa-envelope"></i> CONFIRM VIA EMAIL</button>
                </div>

                <p onclick="location.reload()" style="font-size: 0.55rem; color: #444; text-align: center; margin-top: 20px; cursor: pointer; letter-spacing: 1px;">CANCEL ORDER</p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <script>
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

        VANTA.NET({
            el: "body", mouseControls: true, touchControls: true, gyroControls: false,
            minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
            color: 0xffffff, backgroundColor: 0x0, points: 10.00, maxDistance: 20.00, spacing: 15.00
        });

        // Update Icon Function
        function updateIcon() {
            const select = document.getElementById('cryptoSelect');
            const iconClass = select.options[select.selectedIndex].getAttribute('data-icon');
            const iconType = iconClass.startsWith('fa-') ? 'fas' : 'fab';
            document.getElementById('mainIcon').innerHTML = `<i class="${iconType} ${iconClass}"></i>`;
        }

        let currentPrice = 0;
        let finalAmount = 0;

        async function calculateCrypto() {
            const idr = document.getElementById('amountIDR').value;
            const crypto = document.getElementById('cryptoSelect').value;
            const display = document.getElementById('cryptoResult');
            if (idr < 1000) { display.innerText = "0.0000"; return; }
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${crypto}&vs_currencies=idr`);
                const data = await res.json();
                currentPrice = data[crypto].idr;
                finalAmount = (idr / currentPrice).toFixed(6);
                const assetName = document.getElementById('cryptoSelect').options[document.getElementById('cryptoSelect').selectedIndex].text;
                display.innerText = finalAmount + " " + assetName.split(' ')[0];
            } catch (e) { display.innerText = "PRICE ERROR"; }
        }

        function goToStep2() {
            const idr = document.getElementById('amountIDR').value;
            if (idr < 50000) return alert("Minimal order Rp 50.000 sob!");
            document.getElementById('step1').style.display = "none";
            document.getElementById('step2').style.display = "block";
            const assetName = document.getElementById('cryptoSelect').options[document.getElementById('cryptoSelect').selectedIndex].text;
            document.getElementById('invoiceDetail').innerHTML = `ORDER: <span style="color:#fff">${assetName}</span><br>TOTAL: <span style="color:#fff">RP ${parseInt(idr).toLocaleString('id-ID')}</span><br>RECEIVE: <span style="color:#fff">${finalAmount} ${assetName.split(' ')[0]}</span>`;
        }

        function confirmOrder(type) {
            const idr = document.getElementById('amountIDR').value;
            const assetName = document.getElementById('cryptoSelect').options[document.getElementById('cryptoSelect').selectedIndex].text;
            const msg = encodeURIComponent(`Halo Ouji!\nSaya mau beli crypto eceran.\n\nDetail Pesanan:\n- Aset: ${assetName}\n- Nominal: Rp ${parseInt(idr).toLocaleString('id-ID')}\n- Estimasi: ${finalAmount} ${assetName.split(' ')[0]}\n\nSaya sudah transfer, mohon dicek ya sob!`);
            if (type === 'wa') { window.open(`https://wa.me/6281556694081?text=${msg}`); }
            else { window.open(`mailto:doninovriandi07@gmail.com?subject=Retail Crypto Order&body=${msg}`); }
        }
    </script>
</body>
</html>
