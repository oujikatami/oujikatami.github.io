<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIL CRYPTO | OUJI KATAMI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; overflow-x: hidden; }
        .retail-card {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input, select {
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03);
            border: 1px solid #222; border-radius: 12px; color: #fff;
            font-family: inherit; margin-bottom: 20px; outline: none;
            transition: 0.3s; text-align: center;
        }
        input:focus { border-color: #00ffa3; box-shadow: 0 0 15px rgba(0,255,163,0.1); }
        .btn-order {
            width: 100%; padding: 18px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-order:hover { background: #00ffa3; transform: translateY(-2px); }
        .result-box {
            background: rgba(0, 255, 163, 0.02);
            border: 1px dashed rgba(0, 255, 163, 0.3);
            padding: 20px; border-radius: 15px; margin-bottom: 25px;
        }
    </style>
</head>
<body>

<main id="scroller">
    <section class="snap-panel" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="container" style="width: 100%; max-width: 450px; padding: 20px;">
            
            <div id="step1" class="retail-card">
                <p style="font-size: 0.6rem; color: #666; letter-spacing: 3px; text-align: center; margin-bottom: 25px; font-weight: 800;">CRYPTO RETAIL SYSTEM</p>
                
                <label style="font-size: 0.55rem; color: #444; letter-spacing: 1px; display: block; margin-bottom: 8px;">AMOUNT (IDR)</label>
                <input type="number" id="amountIDR" placeholder="Min. 50,000" oninput="calculateCrypto()">

                <label style="font-size: 0.55rem; color: #444; letter-spacing: 1px; display: block; margin-bottom: 8px;">SELECT ASSET</label>
                <select id="cryptoSelect" onchange="calculateCrypto()">
                    <option value="binancecoin">BNB (SMART CHAIN)</option>
                    <option value="solana">SOLANA</option>
                    <option value="tether">USDT (BEP20)</option>
                    <option value="ethereum">ETHEREUM</option>
                </select>

                <div class="result-box">
                    <p style="font-size: 0.5rem; color: #00ffa3; letter-spacing: 2px; margin-bottom: 5px; text-align: center;">YOU WILL RECEIVE APPROX:</p>
                    <h3 id="cryptoResult" style="font-size: 1.4rem; text-align: center; font-weight: 800; color: #fff;">0.0000</h3>
                </div>

                <button class="btn-order" onclick="goToStep2()">PROCEED TO ORDER</button>
            </div>

            <div id="step2" class="retail-card" style="display: none; text-align: center;">
                <p style="font-size: 0.6rem; color: #666; letter-spacing: 3px; margin-bottom: 20px; font-weight: 800;">PAYMENT INVOICE</p>
                
                <div id="invoiceDetail" style="margin-bottom: 25px; font-size: 0.75rem; color: #888; line-height: 1.8; border-bottom: 1px solid #222; padding-bottom: 20px;">
                </div>

                <div style="background: #fff; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px;">
                    <img src="img/qris-ouji.jpg" style="width: 180px; height: 180px; display: block;" alt="QRIS">
                </div>

                <p style="font-size: 0.5rem; color: #444; letter-spacing: 1px; margin-bottom: 5px;">MANUAL TRANSFER</p>
                <p style="font-size: 0.8rem; color: #fff; font-weight: 800; margin-bottom: 30px;">BANK JAGO : 1234-5678-90<br><span style="font-size: 0.6rem; color: #666;">A/N OUJI KATAMI</span></p>

                <button onclick="confirmOrder('wa')" style="width: 100%; padding: 15px; background: #25D366; color: #fff; border: none; border-radius: 10px; font-weight: 800; margin-bottom: 12px; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px;">CONFIRM VIA WHATSAPP</button>
                
                <p onclick="location.reload()" style="font-size: 0.5rem; color: #444; letter-spacing: 2px; cursor: pointer; margin-top: 20px;">CANCEL ORDER</p>
            </div>

        </div>
    </section>
</main>

<script>
    let currentPrice = 0;
    let finalAmount = 0;

    async function calculateCrypto() {
        const idr = document.getElementById('amountIDR').value;
        const crypto = document.getElementById('cryptoSelect').value;
        if (idr < 1000) return;

        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${crypto}&vs_currencies=idr`);
            const data = await res.json();
            currentPrice = data[crypto].idr;
            finalAmount = (idr / currentPrice).toFixed(6);
            document.getElementById('cryptoResult').innerText = finalAmount + " " + crypto.toUpperCase().replace('BINANCECOIN', 'BNB');
        } catch (e) { console.log("Price Error"); }
    }

    function goToStep2() {
        const idr = document.getElementById('amountIDR').value;
        if (!idr || idr < 50000) return alert("Minimal order Rp 50.000 sob!");
        
        document.getElementById('step1').style.display = "none";
        document.getElementById('step2').style.display = "block";
        
        const cryptoText = document.getElementById('cryptoSelect').options[document.getElementById('cryptoSelect').selectedIndex].text;
        document.getElementById('invoiceDetail').innerHTML = `
            ASSET: <span style="color:#fff">${cryptoText}</span><br>
            TOTAL: <span style="color:#fff">RP ${parseInt(idr).toLocaleString('id-ID')}</span><br>
            RECEIVE: <span style="color:#fff">${finalAmount} ${cryptoText.split(' ')[0]}</span>
        `;
    }

    function confirmOrder(type) {
        const idr = document.getElementById('amountIDR').value;
        const cryptoText = document.getElementById('cryptoSelect').options[document.getElementById('cryptoSelect').selectedIndex].text;
        const msg = encodeURIComponent(`Halo Ouji!\nSaya sudah transfer untuk beli ${cryptoText}.\n\nDetail:\n- Nominal: Rp ${idr}\n- Estimasi: ${finalAmount} ${cryptoText.split(' ')[0]}\n\nMohon diproses ya sob!`);
        window.open(`https://wa.me/628123456789?text=${msg}`); // GANTI NO WA LO
    }
</script>

</body>
  </html>
