<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ōuji Katami | Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* CSS DARURAT BIAR GAK NYASAR KE MENU */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Biar scroll cuma di kotak market */
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Jaring-jaring di paling belakang */
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }

        .market-card {
    /* 1. Background dibikin tipis banget (0.01) biar bener-bener bening */
    background: rgba(10, 10, 10, 0.65) !important; 
    
    /* 2. Border dibikin putih tegas tapi tipis buat ngebentuk siluet kotak */
    border: 1px solid rgba(255, 255, 255, 0.1) !important; 
    
    /* 3. Blur diturunin drastis atau hapus kalau mau jernih banget */
    backdrop-filter: blur(12px) !important; 
    -webkit-backdrop-filter: blur(12px) !important;

    /* Styling sisanya tetep */
    border-radius: 25px;
    width: 100%;
    max-width: 400px;
    height: 70vh;
    display: flex;
    flex-direction: column;
    padding: 20px 15px;
    margin-top: 60px;
    box-sizing: border-box;
    position: relative;
    z-index: 10;
        } 

        .market-header {
            display: flex;
            justify-content: space-between;
            color: #555;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }

        #market-list {
            flex-grow: 1;
            overflow-y: auto; /* INI BIAR BISA DI-SCROLL */
            padding-right: 5px;
        }

        /* Styling Baris Aset (Berjejer) */
        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #111;
        }

        .c-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .c-info img { border-radius: 50%; }
        .c-info span { color: #fff; font-weight: bold; font-size: 0.8rem; }

        .c-price { color: #fff !important; font-weight: bold; font-size: 0.85rem; flex: 1; text-align: center; }
        .c-vol { color: #fff !important; opacity: 0.5; font-size: 0.65rem; flex: 1; text-align: right; }

        /* Hilangkan scrollbar tapi tetep bisa scroll */
        #market-list::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

<nav class="top-nav" style="display: flex !important; justify-content: space-between !important; align-items: center !important; padding: 20px !important; height: 80px !important; width: 100%; box-sizing: border-box; background: transparent; position: relative; z-index: 9999 !important;"> 
    
    <div class="brand-left">
        <a href="retail.html" class="switch-btn-link" style="text-decoration: none; color: #fff; font-size: 0.6rem; font-weight: 800; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-sync-alt" style="color: #f3ba2f;"></i> SWITCH TO EXCHANGE
        </a>
    </div>

    <div class="menu-btn" onclick="toggleMenu()" style="cursor: pointer;">
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

</nav> 

    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()"></div> 

    <div class="drawer-content" style="padding-left: 25px !important; padding-top: 15px !important;">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="drophunting.html">DROP HUNTING</a>
                <a href="retail.html">RETAIL CRYPTO</a>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div style="text-align: center; margin-bottom: 20px;">
    <p style="font-size: 0.5rem; color: #444; letter-spacing: 4px; font-weight: 900; margin: 0; text-transform: uppercase;">
        WELCOME TO <span style="color: #f3ba2f;">CRYPTO</span> MARKET
    </p>
    <div style="width: 30px; height: 1px; background: #222; margin: 10px auto;"></div>
        </div>
        <div class="market-card">


            <div id="market-list">
                <p style="text-align:center; padding-top:50px; color:#333;">Syncing Alpha...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>

    <script>
        // 1. INISIALISASI VANTA (BIAR TETEP ADA JARING-JARINGNYA)
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: false,
            touchControls: false,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x3f3f3f,
            backgroundColor: 0x0,
            points: 10.00,
            maxDistance: 20.00,
            spacing: 15.00
        });

        // 2. FUNGSI UTAMA FETCH MARKET (TOP 30 + DASHBOARD STATUS)
        async function fetchMarket() {
            try {
                // Ambil Top 30 Koin (Biar Gak Kepanjangan)
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=false');
                const coins = await res.json();
                const list = document.getElementById('market-list');
                
                list.innerHTML = '';

                // DASHBOARD STATUS: GAS FEE & TX SCANNER MINI
                const statusDashboard = `
    <div style="background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(0,255,163,0.1); padding: 12px; backdrop-filter: blur(5px);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px;">
             <div style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-gas-pump" style="color: #00ffa3; font-size: 0.6rem;"></i>
                <span style="font-size: 0.6rem; color: #fff; font-weight: 800;">18 <small style="color: #00ffa3;">GWEI</small></span>
             </div>
             <span style="font-size: 0.45rem; color: #555; letter-spacing: 1px; font-weight: 800;">MAINNET STATUS: STABLE</span>
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="txInput" placeholder="Paste TX Hash Here..." style="margin-bottom: 0; padding: 0 10px; font-size: 0.55rem; text-align: left; background: #000; border: 1px solid #333; border-radius: 5px; flex-grow: 1; height: 32px; color: #fff; outline: none;">
            <button onclick="checkTx()" style="background: #00ffa3; color: #000; border: none; border-radius: 5px; padding: 0 15px; font-size: 0.55rem; font-weight: 900; cursor: pointer; height: 32px; letter-spacing: 1px;">SCAN</button>
        </div>
        <div id="txResult" style="font-size: 0.5rem; color: #666; margin-top: 8px; text-align: center; letter-spacing: 1px;">Ready to scan blockchain...</div>
    </div>

    <h2 style="color:#fff; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 2px; text-align: left;">CRYPTOCURRENCY</h2>
    <div class="market-header" style="display: flex; justify-content: space-between; color: #555; font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 5px;">
        <span style="flex:1">ASSET</span>
        <span style="flex:1; text-align:center">PRICE</span>
        <span style="flex:1; text-align:right">VOLUME</span>
    </div>
`; 
                
                list.innerHTML = statusDashboard;

                // LOOPING KOIN (TOP 30)
                coins.forEach(c => {
                    const vol = c.total_volume >= 1e9 
                        ? (c.total_volume / 1e9).toFixed(2) + 'B' 
                        : (c.total_volume / 1e6).toFixed(2) + 'M';

                    list.innerHTML += `
                        <div class="coin-row">
                            <div class="c-info">
                                <img src="${c.image}" width="18">
                                <span>${c.symbol.toUpperCase()}</span>
                            </div>
                            <div class="c-price">$${c.current_price.toLocaleString()}</div>
                            <div class="c-vol">$${vol}</div>
                        </div>
                    `;
                });
            } catch (e) { 
                console.error("Error Fetching"); 
            }
        }

        // 3. FUNGSI SCAN TX (BIAR USER GAK PINDAH WEB)
        function checkTx() {
            const hash = document.getElementById('txInput').value;
            const resultDiv = document.getElementById('txResult');
            
            if (hash.length < 10) {
                resultDiv.innerHTML = "<span style='color: #ff3e3e;'>ERROR: INVALID HASH SOB!</span>";
                return;
            }

            resultDiv.innerHTML = "<i class='fas fa-sync fa-spin'></i> SEARCHING ON MAINNET...";

            // Simulasi proses "Scanning" (1.5 detik biar dramatis)
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div style="background: rgba(0,255,163,0.05); padding: 8px; border-radius: 5px; border: 1px solid rgba(0,255,163,0.2); color: #00ffa3;">
                        <i class="fas fa-check-circle"></i> TX FOUND! 
                        <a href="https://etherscan.io/tx/${hash}" target="_blank" style="color:#fff; text-decoration:underline; margin-left: 5px;">VIEW ON EXPLORER</a>
                    </div>
                `;
            }, 1500);
        }

        // 4. JALANKAN PROGRAM
        fetchMarket();
        setInterval(fetchMarket, 30000); // Auto-update tiap 30 detik

        // FUNGSI MENU
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
</script> 
</body>
</html>
