<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ōuji Katami | Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* CSS DARURAT BIAR GAK NYASAR KE MENU */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Biar scroll cuma di kotak market */
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Jaring-jaring di paling belakang */
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 15px;
        }

        .market-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            backdrop-filter: blur(10px);
            margin-top: 60px; /* Jarak dari navbar */
        }

        .market-header {
            display: flex;
            justify-content: space-between;
            color: #555;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }

        #market-list {
            flex-grow: 1;
            overflow-y: auto; /* INI BIAR BISA DI-SCROLL */
            padding-right: 5px;
        }

        /* Styling Baris Aset (Berjejer) */
        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #111;
        }

        .c-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .c-info img { border-radius: 50%; }
        .c-info span { color: #fff; font-weight: bold; font-size: 0.8rem; }

        .c-price { color: #fff !important; font-weight: bold; font-size: 0.85rem; flex: 1; text-align: center; }
        .c-vol { color: #fff !important; opacity: 0.5; font-size: 0.65rem; flex: 1; text-align: right; }

        /* Hilangkan scrollbar tapi tetep bisa scroll */
        #market-list::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <nav class="top-nav">
        <div class="brand-left">CRYPTO <span style="color: #666;">MARKET</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()"></div> 

    <div class="drawer-content" style="padding-left: 25px !important; padding-top: 15px !important;">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="drophunting.html">DROP HUNTING</a>
                <a href="retail.html">BUY CRYPTO</a>
                <a href="sell.html">SELL CRYPTO</a>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="market-card">
            <h2 style="color:#fff; font-size: 0.9rem; margin-bottom: 15px; letter-spacing: 2px;">LIVE CRYPTO MARKET</h2>
            
            <div class="market-header">
                <span style="flex:1">ASSET</span>
                <span style="flex:1; text-align:center">PRICE</span>
                <span style="flex:1; text-align:right">VOLUME</span>
            </div>

            <div id="market-list">
                <p style="text-align:center; padding-top:50px; color:#333;">Syncing Alpha...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>

    <script>
        // INISIALISASI ULANG VANTA KHUSUS DI SINI
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: false,
            touchControls: false,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x3f3f3f,
            backgroundColor: 0x0,
            points: 10.00,
            maxDistance: 20.00,
            spacing: 15.00
        });

        async function fetchMarket() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                const coins = await res.json();
                const list = document.getElementById('market-list');
                list.innerHTML = '';

                coins.forEach(c => {
                    const vol = c.total_volume >= 1e9 
                        ? (c.total_volume / 1e9).toFixed(2) + 'B' 
                        : (c.total_volume / 1e6).toFixed(2) + 'M';

                    list.innerHTML += `
                        <div class="coin-row">
                            <div class="c-info">
                                <img src="${c.image}" width="18">
                                <span>${c.symbol.toUpperCase()}</span>
                            </div>
                            <div class="c-price">$${c.current_price.toLocaleString()}</div>
                            <div class="c-vol">$${vol}</div>
                        </div>
                    `;
                });
            } catch (e) { console.error("Error Fetching"); }
        }
        fetchMarket();
        setInterval(fetchMarket, 30000);
    </script>
</body>
</html>
