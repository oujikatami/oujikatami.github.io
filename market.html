<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ōuji Katami | Crypto Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="intro-active">

    <div id="intro-overlay"></div>

    <nav class="top-nav">
        <div class="brand-left">CRYPTO <span style="color: #666;">MARKET</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()"> 
        <div class="drawer-content">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="airdrop.html">AIRDROP</a>
            </div>
        </div>
    </div>

    <main id="scroller">
        <section class="snap-panel">
            <div class="container" style="max-width: 500px;">
                <div class="cyber-box market-box-api">
                    <h2 style="margin-bottom: 15px;">LIVE MARKET DATA</h2>
                    
                    <div class="table-wrapper">
                        <table class="crypto-table">
                            <thead>
                                <tr>
                                    <th>ASSET</th>
                                    <th>PRICE</th>
                                    <th>VOLUME (24H)</th>
                                </tr>
                            </thead>
                            <tbody id="market-data-body">
                                <tr><td colspan="3" style="padding: 50px;">Loading Alpha Data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>

    <script>
        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                const data = await response.json();
                
                const tableBody = document.getElementById('market-data-body');
                tableBody.innerHTML = '';

                data.forEach(coin => {
                    const row = `
                        <tr>
                            <td>
                                <div class="asset-info">
                                    <img src="${coin.image}" width="18">
                                    <strong>${coin.symbol.toUpperCase()}</strong>
                                </div>
                            </td>
                            <td>$${coin.current_price.toLocaleString()}</td>
                            <td style="color: #666;">$${coin.total_volume.toLocaleString()}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                document.getElementById('market-data-body').innerHTML = '<tr><td colspan="3">Failed to fetch data. Try again.</td></tr>';
            }
        }
        // Jalankan pas halaman kebuka
        fetchMarketData();
    </script>
</body>
</html>
