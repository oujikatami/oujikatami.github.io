<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ōuji Katami | Crypto Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="intro-active">

    <div id="intro-overlay"></div>

    <nav class="top-nav">
        <div class="brand-left">CRYPTO <span style="color: #666;">MARKET</span></div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div>
        </div>
    </nav>

    <div id="side-menu" class="side-drawer">
        <div class="close-menu" onclick="toggleMenu()">

        <div class="drawer-content">
            <h3 class="menu-title">MENU</h3>
            <div class="menu-links">
                <a href="index.html">ŌUJI KATAMI PORTFOLIO</a>
                <a href="community.html">AIRDROP SCOUT COMMUNITY</a>
                <a href="services.html">ŌUJI SERVICE</a>
                <a href="airdrop.html">DROP HUNTING</a>
            </div>
        </div>
    </div>

    <main id="scroller">
        <section class="snap-panel">
            <div class="market-layout">
                <div class="cyber-box market-v5">
                    <h2 class="title-market">LIVE CRYPTO MARKET</h2>
                    <div class="scroll-area">
                        <table class="final-table">
                            <thead>
                                <tr>
                                    <th>ASSET</th>
                                    <th>PRICE</th>
                                    <th style="text-align: right;">VOLUME</th>
                                </tr>
                            </thead>
                            <tbody id="market-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>
    <script>
        async function getMarket() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                const coins = await res.json();
                const list = document.getElementById('market-list');
                list.innerHTML = '';
                coins.forEach(c => {
                    list.innerHTML += `
                        <tr>
                            <td>
                                <div class="coin-cell">
                                    <img src="${c.image}" width="16">
                                    <span>${c.symbol.toUpperCase()}</span>
                                </div>
                            </td>
                            <td class="price-cell">$${c.current_price.toLocaleString()}</td>
                            <td class="vol-cell">$${Math.round(c.total_volume).toLocaleString()}</td>
                        </tr>
                    `;
                });
            } catch (e) { console.log("Error fetch"); }
        }
        getMarket();
        setInterval(getMarket, 30000);
    </script>
</body>
</html>
