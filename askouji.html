<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASK OUJI AI | AIRDROP SCOUT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #vanta-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; }

        /* HEADER NAVIGASI */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 999;
        }

        .switch-home {
            text-decoration: none; color: #fff; font-size: 0.6rem; font-weight: 800;
            background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 6px; transition: 0.3s;
        }

        /* WADAH UTAMA */
        main {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 80px 15px 20px;
            box-sizing: border-box; position: relative; z-index: 10;
        }

        .chat-container {
            width: 100%; max-width: 450px; height: 100%; max-height: 600px;
            background: rgba(10, 10, 10, 0.7); border: 1px solid rgba(0, 255, 163, 0.15);
            border-radius: 20px; backdrop-filter: blur(15px); display: flex;
            flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* AREA CHAT (SCROLLABLE) */
        #chatDisplay {
            flex-grow: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }
        #chatDisplay::-webkit-scrollbar { width: 2px; }
        #chatDisplay::-webkit-scrollbar-thumb { background: #00ffa3; }

        /* BUBBLE CHAT */
        .ai-msg { background: rgba(255,255,255,0.05); color: #fff; padding: 12px; border-radius: 15px 15px 15px 0; font-size: 0.7rem; max-width: 85%; align-self: flex-start; border-left: 2px solid #00ffa3; line-height: 1.4; }
        .user-msg { background: #00ffa3; color: #000; padding: 10px 15px; border-radius: 15px 15px 0 15px; font-size: 0.7rem; font-weight: 700; max-width: 80%; align-self: flex-end; box-shadow: 0 5px 15px rgba(0,255,163,0.2); }

        /* INPUT AREA */
        .input-area {
            padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        input {
            flex-grow: 1; background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 12px; color: #fff; padding: 12px; font-size: 0.75rem; outline: none;
        }
        button {
            width: 45px; height: 45px; border-radius: 12px; border: none;
            background: #00ffa3; color: #000; cursor: pointer; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <nav class="top-nav">
        <a href="index.html" class="switch-home">
            <i class="fas fa-home" style="color: #00ffa3;"></i> HOME
        </a>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="bar"></div><div class="bar"></div>
        </div>
    </nav>

    <main>
        <h1 style="font-size: 0.8rem; color: #fff; letter-spacing: 5px; font-weight: 900; margin-bottom: 20px; text-align: center;">ASK OUJI AI</h1>

        <div class="chat-container">
            <div id="chatDisplay">
                <div class="ai-msg">Halo sob! Gue **ŌUJI AI**. <br>Tanya apa aja soal Airdrop atau Crypto hari ini, gass!</div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Tanya sesuatu..." onkeypress="handleKey(event)">
                <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        // VANTA BACKGROUND
        VANTA.NET({
            el: "#vanta-canvas", mouseControls: true, touchControls: true, gyroControls: true,
            minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
            color: 0xffffff, backgroundColor: 0x0, points: 12.00, maxDistance: 25.00, spacing: 15.00
        });

        const API_KEY = "AIzaSyBVSc2s33APDBg2P1xgszK-VBvgPfaxmU8";

        async function askAI() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const question = input.value.trim();
            if (!question) return;

            // User Chat
            display.innerHTML += `<div class="user-msg">${question}</div>`;
            input.value = "";
            display.scrollTop = display.scrollHeight;

            // Loader
            const loader = document.createElement('div');
            loader.style.fontSize = '0.5rem';
            loader.style.color = '#444';
            loader.innerText = 'OUJI LAGI MIKIR...';
            display.appendChild(loader);
            display.scrollTop = display.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Nama kamu adalah ŌUJI AI, asisten pakar airdrop crypto dari AirdropScout0x. Gunakan gaya bahasa gaul Indonesia seperti 'sob', 'cuan', 'gasspoll'. Jawab pertanyaan singkat: ${question}` }] }]
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                loader.remove();
                display.innerHTML += `<div class="ai-msg">${aiResponse}</div>`;
            } catch (e) {
                loader.innerText = "ERROR SINYAL!";
            }
            display.scrollTop = display.scrollHeight;
        }

        function handleKey(e) { if (e.key === 'Enter') askAI(); }
        function toggleMenu() { /* Integrasi sidebar lo di sini */ }
    </script>
</body>
  </html>
