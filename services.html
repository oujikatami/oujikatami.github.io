<div class="cyber-box payment-box-final">

<div class="pay-item">

        <p class="pay-label-final">WALLET ADDRESS</p>
        <div class="address-card-final">
            <code>0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af</code>
            <button onclick="copyAddress()" id="copyBtn"><i class="fas fa-copy"></i></button>

</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>
    <script>
        function copyAddress() {
            const addr = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af";
            navigator.clipboard.writeText(addr);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check" style="color: #00ff00"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 2000);
        }
    </script>
