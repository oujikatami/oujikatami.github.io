<body class="intro-active">

    <div id="intro-overlay"></div>

    <main id="scroller">
        <section class="snap-panel">

                <div class="cyber-box service-box-final">

                        <div class="service-row-v2">

                        </div>
                    </div>

                </div>
            </div>

        <section class="snap-panel">
            <div class="container">
<div class="cyber-box payment-box-final">
    <h2>Payment</h2>
    
    <div class="pay-content">
        <div class="pay-row">
            <span class="pay-label-mini">STABLE COIN</span>
            <div class="pay-group">
                <div class="pay-item-v3"><i class="fas fa-coins" style="color: #26a17b;"></i> USDT</div>
                <div class="pay-item-v3"><i class="fas fa-dollar-sign" style="color: #2775ca;"></i> USDC</div>
            </div>
        </div>

        <div class="pay-row" style="margin-top: 15px;">
            <span class="pay-label-mini">NETWORK</span>
            <div class="pay-group">
                <div class="pay-item-v3"><i class="fab fa-ethereum" style="color: #627eea;"></i> ETHEREUM</div>
            </div>
        </div>

        <div class="pay-row" style="margin-top: 20px;">
            <span class="pay-label-mini">WALLET ADDRESS</span>
            <div class="address-bar-v3">
                <code>0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af</code>
                <i class="fas fa-copy" onclick="copyAddress()" style="cursor:pointer;"></i>
            </div>
        </div>
    </div>
</div> 

                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="script.js"></script>
    <script>
        function copyAddress() {
            const addr = "0xec274f9b3084a7aab2fa4cc077b1abcac4eae2af";
            navigator.clipboard.writeText(addr);
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = '<i class="fas fa-check" style="color: #00ff00"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 2000);
        }
    </script>
